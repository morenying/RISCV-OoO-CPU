# RISC-V OoO CPU CI/CD Pipeline
# Runs lint, tests, and coverage on every push/PR

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator
          
      - name: Run Verilator Lint
        run: |
          verilator --lint-only -Wall \
            -Irtl/common -Irtl \
            rtl/core/*.v rtl/cache/*.v rtl/bpu/*.v rtl/mem/*.v rtl/bus/*.v \
            2>&1 | tee lint_report.txt
          
      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint_report.txt

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
          
      - name: Create directories
        run: |
          mkdir -p sim/logs sim/waves
          
      - name: Run ALU Tests
        run: |
          iverilog -g2001 -Wall -Irtl/common -Irtl -o sim/test_alu.vvp \
            rtl/common/cpu_defines.vh rtl/core/alu_unit.v tb/unit/tb_alu_unit.v
          vvp sim/test_alu.vvp | tee sim/logs/test_alu.log
          
      - name: Run Multiplier Tests
        run: |
          iverilog -g2001 -Wall -Irtl/common -Irtl -o sim/test_mul.vvp \
            rtl/common/cpu_defines.vh rtl/core/mul_unit.v tb/unit/tb_mul_unit.v
          vvp sim/test_mul.vvp | tee sim/logs/test_mul.log
          
      - name: Run Divider Tests
        run: |
          iverilog -g2001 -Wall -Irtl/common -Irtl -o sim/test_div.vvp \
            rtl/common/cpu_defines.vh rtl/core/div_unit.v tb/unit/tb_div_unit.v
          vvp sim/test_div.vvp | tee sim/logs/test_div.log
          
      - name: Run Decoder Tests
        run: |
          iverilog -g2001 -Wall -Irtl/common -Irtl -o sim/test_decoder.vvp \
            rtl/common/cpu_defines.vh rtl/core/decoder.v rtl/core/imm_gen.v tb/unit/tb_decoder.v
          vvp sim/test_decoder.vvp | tee sim/logs/test_decoder.log
          
      - name: Run Branch Tests
        run: |
          iverilog -g2001 -Wall -Irtl/common -Irtl -o sim/test_branch.vvp \
            rtl/common/cpu_defines.vh rtl/core/branch_unit.v tb/unit/tb_branch_unit.v
          vvp sim/test_branch.vvp | tee sim/logs/test_branch.log
          
      - name: Run BPU Tests
        run: |
          iverilog -g2001 -Wall -Irtl/common -Irtl -o sim/test_bpu.vvp \
            rtl/common/cpu_defines.vh rtl/bpu/*.v tb/unit/tb_bpu.v
          vvp sim/test_bpu.vvp | tee sim/logs/test_bpu.log
          
      - name: Run Cache Tests
        run: |
          iverilog -g2001 -Wall -Irtl/common -Irtl -o sim/test_cache.vvp \
            rtl/common/cpu_defines.vh rtl/cache/icache.v rtl/cache/dcache.v tb/unit/tb_cache.v
          vvp sim/test_cache.vvp | tee sim/logs/test_cache.log
          
      - name: Run LSQ Tests
        run: |
          iverilog -g2001 -Wall -Irtl/common -Irtl -o sim/test_lsq.vvp \
            rtl/common/cpu_defines.vh rtl/mem/load_queue.v rtl/mem/store_queue.v rtl/mem/lsq.v tb/unit/tb_lsq.v
          vvp sim/test_lsq.vvp | tee sim/logs/test_lsq.log
          
      - name: Run Exception Tests
        run: |
          iverilog -g2001 -Wall -Irtl/common -Irtl -o sim/test_exception.vvp \
            rtl/common/cpu_defines.vh rtl/core/exception_unit.v tb/unit/tb_exception.v
          vvp sim/test_exception.vvp | tee sim/logs/test_exception.log
          
      - name: Run Pipeline Control Tests
        run: |
          iverilog -g2001 -Wall -Irtl/common -Irtl -o sim/test_pipeline_ctrl.vvp \
            rtl/common/cpu_defines.vh rtl/core/pipeline_ctrl.v tb/unit/tb_pipeline_ctrl.v
          vvp sim/test_pipeline_ctrl.vvp | tee sim/logs/test_pipeline_ctrl.log
          
      - name: Run OoO Dependency Tests
        run: |
          iverilog -g2001 -Wall -Irtl/common -Irtl -o sim/test_ooo_deps.vvp \
            rtl/common/cpu_defines.vh rtl/core/rat.v rtl/core/free_list.v rtl/core/rob.v tb/unit/tb_ooo_deps.v
          vvp sim/test_ooo_deps.vvp | tee sim/logs/test_ooo_deps.log
          
      - name: Check Test Results
        run: |
          echo "=== Test Summary ==="
          grep -h "PASSED\|FAILED\|ERROR" sim/logs/*.log || true
          # Fail if any test failed
          if grep -q "FAILED\|ERROR" sim/logs/*.log; then
            echo "Some tests failed!"
            exit 1
          fi
          echo "All tests passed!"
          
      - name: Upload Test Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs
          path: sim/logs/

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
          
      - name: Create directories
        run: |
          mkdir -p sim/logs sim/waves
          
      - name: Run Instruction Tests
        run: |
          iverilog -g2001 -Wall -Irtl/common -Irtl -o sim/test_instr.vvp \
            rtl/common/cpu_defines.vh \
            rtl/core/*.v rtl/cache/*.v rtl/bpu/*.v rtl/mem/*.v rtl/bus/*.v \
            tb/integration/tb_instr_tests.v
          vvp sim/test_instr.vvp | tee sim/logs/test_instr.log
          
      - name: Upload Integration Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-logs
          path: sim/logs/

  synthesis:
    name: Synthesis Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys
          
      - name: Run Yosys Synthesis Check
        run: |
          yosys -p "
            read_verilog -Irtl/common -Irtl rtl/core/*.v rtl/cache/*.v rtl/bpu/*.v rtl/mem/*.v rtl/bus/*.v;
            hierarchy -check -top cpu_core_top;
            proc;
            opt;
            check;
            stat;
          " 2>&1 | tee synth_report.txt
          
      - name: Upload Synthesis Report
        uses: actions/upload-artifact@v4
        with:
          name: synthesis-report
          path: synth_report.txt
