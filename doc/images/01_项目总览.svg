<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- 极光渐变 -->
    <linearGradient id="auroraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#1a1a4e;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0d3d3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a2a2a;stop-opacity:1" />
    </linearGradient>
    
    <!-- 极光光带 -->
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#00ff88;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#00ffcc;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#00ccff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:0" />
    </linearGradient>
    
    <linearGradient id="aurora2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0088ff;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#00ccff;stop-opacity:0.5" />
      <stop offset="60%" style="stop-color:#00ffaa;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#00ff66;stop-opacity:0" />
    </linearGradient>
    
    <!-- 星星发光效果 -->
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <!-- 文字发光 -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <!-- 模块框发光 -->
    <filter id="boxGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="url(#auroraGradient)"/>
  
  <!-- 星星 -->
  <g filter="url(#starGlow)">
    <circle cx="50" cy="80" r="1.5" fill="#ffffff"/><circle cx="150" cy="120" r="1" fill="#aaddff"/>
    <circle cx="280" cy="60" r="2" fill="#ffffff"/><circle cx="400" cy="100" r="1" fill="#88ccff"/>
    <circle cx="520" cy="40" r="1.5" fill="#ffffff"/><circle cx="680" cy="90" r="1" fill="#aaddff"/>
    <circle cx="800" cy="50" r="2" fill="#ffffff"/><circle cx="920" cy="110" r="1" fill="#88ccff"/>
    <circle cx="1050" cy="70" r="1.5" fill="#ffffff"/><circle cx="1150" cy="130" r="1" fill="#aaddff"/>
    <circle cx="100" cy="200" r="1" fill="#ffffff"/><circle cx="300" cy="180" r="1.5" fill="#88ccff"/>
    <circle cx="500" cy="160" r="1" fill="#ffffff"/><circle cx="700" cy="190" r="2" fill="#aaddff"/>
    <circle cx="900" cy="170" r="1" fill="#ffffff"/><circle cx="1100" cy="210" r="1.5" fill="#88ccff"/>
    <circle cx="80" cy="700" r="1" fill="#ffffff"/><circle cx="200" cy="720" r="1.5" fill="#aaddff"/>
    <circle cx="350" cy="680" r="1" fill="#ffffff"/><circle cx="550" cy="750" r="2" fill="#88ccff"/>
    <circle cx="750" cy="710" r="1" fill="#ffffff"/><circle cx="950" cy="740" r="1.5" fill="#aaddff"/>
    <circle cx="1100" cy="690" r="1" fill="#ffffff"/>
  </g>
  
  <!-- 极光光带 -->
  <ellipse cx="600" cy="150" rx="500" ry="80" fill="url(#aurora1)" opacity="0.4"/>
  <ellipse cx="400" cy="200" rx="400" ry="60" fill="url(#aurora2)" opacity="0.3"/>
  <ellipse cx="800" cy="180" rx="350" ry="50" fill="url(#aurora1)" opacity="0.25"/>
  
  <!-- 标题 -->
  <text x="600" y="100" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="52" fill="#00ffcc" filter="url(#textGlow)">
    RISC-V 乱序执行处理器
  </text>
  <text x="600" y="150" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="26" fill="#88ddff">
    RV32IM 七级流水线架构 · 高性能微处理器核心
  </text>
  
  <!-- 流水线框图 -->
  <g transform="translate(100, 220)">
    <g filter="url(#boxGlow)">
      <rect x="0" y="0" width="120" height="60" rx="10" fill="rgba(0,100,100,0.3)" stroke="#00ffaa" stroke-width="2"/>
      <text x="60" y="38" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#00ffcc">取指 IF</text>
      
      <rect x="150" y="0" width="120" height="60" rx="10" fill="rgba(0,100,100,0.3)" stroke="#00ffaa" stroke-width="2"/>
      <text x="210" y="38" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#00ffcc">译码 ID</text>
      
      <rect x="300" y="0" width="120" height="60" rx="10" fill="rgba(0,100,100,0.3)" stroke="#00ffaa" stroke-width="2"/>
      <text x="360" y="38" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#00ffcc">重命名 RN</text>
      
      <rect x="450" y="0" width="120" height="60" rx="10" fill="rgba(0,100,100,0.3)" stroke="#00ffaa" stroke-width="2"/>
      <text x="510" y="38" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#00ffcc">发射 IS</text>
      
      <rect x="600" y="0" width="120" height="60" rx="10" fill="rgba(0,100,100,0.3)" stroke="#00ffaa" stroke-width="2"/>
      <text x="660" y="38" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#00ffcc">执行 EX</text>
      
      <rect x="750" y="0" width="120" height="60" rx="10" fill="rgba(0,100,100,0.3)" stroke="#00ffaa" stroke-width="2"/>
      <text x="810" y="38" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#00ffcc">访存 MEM</text>
      
      <rect x="900" y="0" width="120" height="60" rx="10" fill="rgba(0,100,100,0.3)" stroke="#00ffaa" stroke-width="2"/>
      <text x="960" y="38" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#00ffcc">写回 WB</text>
    </g>
    
    <g stroke="#00ccff" stroke-width="3" fill="#00ccff">
      <line x1="120" y1="30" x2="145" y2="30"/><polygon points="145,25 155,30 145,35"/>
      <line x1="270" y1="30" x2="295" y2="30"/><polygon points="295,25 305,30 295,35"/>
      <line x1="420" y1="30" x2="445" y2="30"/><polygon points="445,25 455,30 445,35"/>
      <line x1="570" y1="30" x2="595" y2="30"/><polygon points="595,25 605,30 595,35"/>
      <line x1="720" y1="30" x2="745" y2="30"/><polygon points="745,25 755,30 745,35"/>
      <line x1="870" y1="30" x2="895" y2="30"/><polygon points="895,25 905,30 895,35"/>
    </g>
  </g>
  
  <!-- 核心组件区域 -->
  <g transform="translate(100, 350)">
    <text x="450" y="0" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="28" fill="#00ffaa" filter="url(#textGlow)">核心组件</text>
    
    <g transform="translate(0, 30)" filter="url(#boxGlow)">
      <rect x="0" y="0" width="300" height="180" rx="15" fill="rgba(0,50,80,0.4)" stroke="#00aaff" stroke-width="2"/>
      <text x="150" y="30" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="18" fill="#00ddff">乱序执行引擎</text>
      <line x1="20" y1="45" x2="280" y2="45" stroke="#00aaff" stroke-width="1" opacity="0.5"/>
      <text x="30" y="75" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaddff">• ROB 重排序缓冲 (32项)</text>
      <text x="30" y="100" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaddff">• RAT 寄存器别名表</text>
      <text x="30" y="125" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaddff">• PRF 物理寄存器 (64个)</text>
      <text x="30" y="150" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaddff">• 保留站 (4项/功能单元)</text>
      <text x="30" y="175" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaddff">• CDB 公共数据总线</text>
    </g>
    
    <g transform="translate(350, 30)" filter="url(#boxGlow)">
      <rect x="0" y="0" width="300" height="180" rx="15" fill="rgba(0,80,50,0.4)" stroke="#00ffaa" stroke-width="2"/>
      <text x="150" y="30" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="18" fill="#00ffcc">功能单元</text>
      <line x1="20" y1="45" x2="280" y2="45" stroke="#00ffaa" stroke-width="1" opacity="0.5"/>
      <text x="30" y="75" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• ALU 算术逻辑单元</text>
      <text x="30" y="100" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• MUL 乘法器 (3周期)</text>
      <text x="30" y="125" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• DIV 除法器 (34周期)</text>
      <text x="30" y="150" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• BRU 分支单元</text>
      <text x="30" y="175" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• AGU 地址生成单元</text>
    </g>
    
    <g transform="translate(700, 30)" filter="url(#boxGlow)">
      <rect x="0" y="0" width="300" height="180" rx="15" fill="rgba(50,50,100,0.4)" stroke="#8888ff" stroke-width="2"/>
      <text x="150" y="30" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="18" fill="#aaaaff">存储子系统</text>
      <line x1="20" y1="45" x2="280" y2="45" stroke="#8888ff" stroke-width="1" opacity="0.5"/>
      <text x="30" y="75" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ccccff">• I-Cache 4KB 4路组相联</text>
      <text x="30" y="100" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ccccff">• D-Cache 4KB 写回式</text>
      <text x="30" y="125" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ccccff">• Load Queue (8项)</text>
      <text x="30" y="150" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ccccff">• Store Queue (8项)</text>
      <text x="30" y="175" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ccccff">• AXI 总线接口</text>
    </g>
  </g>
  
  <!-- 底部性能指标 -->
  <g transform="translate(100, 620)">
    <text x="450" y="0" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="24" fill="#00ffaa" filter="url(#textGlow)">性能目标</text>
    
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="200" height="80" rx="10" fill="rgba(0,100,80,0.25)" stroke="#00ffaa" stroke-width="1"/>
      <text x="100" y="35" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">时钟频率</text>
      <text x="100" y="60" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#ffffff">100 MHz</text>
    </g>
    
    <g transform="translate(250, 30)">
      <rect x="0" y="0" width="200" height="80" rx="10" fill="rgba(0,100,80,0.25)" stroke="#00ffaa" stroke-width="1"/>
      <text x="100" y="35" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">IPC 目标</text>
      <text x="100" y="60" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#ffffff">> 0.8</text>
    </g>
    
    <g transform="translate(500, 30)">
      <rect x="0" y="0" width="200" height="80" rx="10" fill="rgba(0,100,80,0.25)" stroke="#00ffaa" stroke-width="1"/>
      <text x="100" y="35" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">分支预测准确率</text>
      <text x="100" y="60" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#ffffff">> 90%</text>
    </g>
    
    <g transform="translate(750, 30)">
      <rect x="0" y="0" width="200" height="80" rx="10" fill="rgba(0,100,80,0.25)" stroke="#00ffaa" stroke-width="1"/>
      <text x="100" y="35" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">缓存命中率</text>
      <text x="100" y="60" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#ffffff">> 95%</text>
    </g>
  </g>
  
  <text x="600" y="780" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#668888" opacity="0.7">
    RISC-V RV32IM 乱序执行处理器项目
  </text>
</svg>