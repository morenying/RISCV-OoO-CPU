<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a25"/>
      <stop offset="40%" style="stop-color:#0d2040"/>
      <stop offset="100%" style="stop-color:#051a1a"/>
    </linearGradient>
    <linearGradient id="auroraG1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff66;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00ffaa;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00aaff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="auroraG2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00ccff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow3"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="boxG3"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bg3)"/>
  
  <!-- 星空 -->
  <g opacity="0.8">
    <circle cx="60" cy="40" r="1.5" fill="#fff"/><circle cx="180" cy="70" r="1" fill="#adf"/>
    <circle cx="320" cy="35" r="2" fill="#fff"/><circle cx="480" cy="80" r="1" fill="#8cf"/>
    <circle cx="620" cy="25" r="1.5" fill="#fff"/><circle cx="780" cy="60" r="1" fill="#adf"/>
    <circle cx="920" cy="45" r="2" fill="#fff"/><circle cx="1080" cy="75" r="1" fill="#8cf"/>
    <circle cx="100" cy="130" r="1" fill="#fff"/><circle cx="350" cy="110" r="1.5" fill="#adf"/>
    <circle cx="650" cy="120" r="1" fill="#fff"/><circle cx="950" cy="100" r="1.5" fill="#8cf"/>
    <circle cx="50" cy="750" r="1" fill="#fff"/><circle cx="250" cy="770" r="1.5" fill="#adf"/>
    <circle cx="550" cy="740" r="1" fill="#fff"/><circle cx="850" cy="760" r="2" fill="#8cf"/>
    <circle cx="1100" cy="730" r="1" fill="#fff"/>
  </g>
  
  <!-- 极光 -->
  <ellipse cx="600" cy="100" rx="500" ry="60" fill="url(#auroraG1)" opacity="0.4"/>
  <ellipse cx="400" cy="140" rx="350" ry="45" fill="url(#auroraG2)" opacity="0.3"/>
  
  <!-- 标题 -->
  <text x="600" y="70" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="46" fill="#00ffcc" filter="url(#glow3)">分支预测单元 BPU</text>
  <text x="600" y="110" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#88ddff">Branch Prediction Unit · 高精度混合预测器</text>

  <!-- BPU 架构图 -->
  <g transform="translate(50, 150)">
    <!-- 主预测器框 -->
    <g filter="url(#boxG3)">
      <rect x="0" y="0" width="500" height="400" rx="15" fill="rgba(0,60,80,0.3)" stroke="#00aaff" stroke-width="2"/>
      <text x="250" y="35" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="24" fill="#00ddff">混合预测器</text>
      <line x1="20" y1="50" x2="480" y2="50" stroke="#00aaff" opacity="0.4"/>
      
      <!-- TAGE 预测器 -->
      <g transform="translate(20, 70)">
        <rect x="0" y="0" width="220" height="140" rx="10" fill="rgba(0,100,80,0.3)" stroke="#00ffaa" stroke-width="1.5"/>
        <text x="110" y="28" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="18" fill="#00ffcc">TAGE 预测器</text>
        <line x1="10" y1="40" x2="210" y2="40" stroke="#00ffaa" opacity="0.3"/>
        <text x="15" y="65" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffcc">• 标签几何历史预测</text>
        <text x="15" y="85" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffcc">• 多表级联结构</text>
        <text x="15" y="105" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffcc">• 全局历史索引</text>
        <text x="15" y="125" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffcc">• 有用位管理</text>
      </g>
      
      <!-- Bimodal 预测器 -->
      <g transform="translate(260, 70)">
        <rect x="0" y="0" width="220" height="140" rx="10" fill="rgba(80,80,0,0.3)" stroke="#ffcc00" stroke-width="1.5"/>
        <text x="110" y="28" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="18" fill="#ffdd44">双模态预测器</text>
        <line x1="10" y1="40" x2="210" y2="40" stroke="#ffcc00" opacity="0.3"/>
        <text x="15" y="65" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffeebb">• 2-bit 饱和计数器</text>
        <text x="15" y="85" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffeebb">• PC 索引</text>
        <text x="15" y="105" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffeebb">• 基础预测器</text>
        <text x="15" y="125" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffeebb">• 低延迟访问</text>
      </g>
      
      <!-- 循环预测器 -->
      <g transform="translate(20, 230)">
        <rect x="0" y="0" width="220" height="140" rx="10" fill="rgba(80,0,80,0.3)" stroke="#ff88ff" stroke-width="1.5"/>
        <text x="110" y="28" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="18" fill="#ffaaff">循环预测器</text>
        <line x1="10" y1="40" x2="210" y2="40" stroke="#ff88ff" opacity="0.3"/>
        <text x="15" y="65" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffccff">• 循环迭代检测</text>
        <text x="15" y="85" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffccff">• 计数器跟踪</text>
        <text x="15" y="105" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffccff">• 退出预测</text>
        <text x="15" y="125" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffccff">• 置信度评估</text>
      </g>
      
      <!-- 选择逻辑 -->
      <g transform="translate(260, 230)">
        <rect x="0" y="0" width="220" height="140" rx="10" fill="rgba(0,80,100,0.3)" stroke="#00ccff" stroke-width="1.5"/>
        <text x="110" y="28" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="18" fill="#00ddff">预测选择器</text>
        <line x1="10" y1="40" x2="210" y2="40" stroke="#00ccff" opacity="0.3"/>
        <text x="15" y="65" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">• 多源预测仲裁</text>
        <text x="15" y="85" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">• 置信度比较</text>
        <text x="15" y="105" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">• 最终预测输出</text>
        <text x="15" y="125" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">• 更新策略</text>
      </g>
    </g>
    
    <!-- 目标预测框 -->
    <g transform="translate(550, 0)" filter="url(#boxG3)">
      <rect x="0" y="0" width="250" height="190" rx="15" fill="rgba(0,80,60,0.3)" stroke="#00ffaa" stroke-width="2"/>
      <text x="125" y="35" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="22" fill="#00ffcc">BTB 分支目标缓冲</text>
      <line x1="20" y1="50" x2="230" y2="50" stroke="#00ffaa" opacity="0.4"/>
      <text x="25" y="80" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• 256 项全相联</text>
      <text x="25" y="105" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• PC 标签匹配</text>
      <text x="25" y="130" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• 目标地址缓存</text>
      <text x="25" y="155" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• 分支类型记录</text>
      <text x="25" y="180" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• LRU 替换策略</text>
    </g>
    
    <!-- RAS 返回地址栈 -->
    <g transform="translate(550, 210)" filter="url(#boxG3)">
      <rect x="0" y="0" width="250" height="190" rx="15" fill="rgba(60,60,0,0.3)" stroke="#ffcc00" stroke-width="2"/>
      <text x="125" y="35" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="22" fill="#ffdd44">RAS 返回地址栈</text>
      <line x1="20" y1="50" x2="230" y2="50" stroke="#ffcc00" opacity="0.4"/>
      <text x="25" y="80" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ffeebb">• 8 项深度栈</text>
      <text x="25" y="105" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ffeebb">• CALL 压栈</text>
      <text x="25" y="130" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ffeebb">• RET 弹栈</text>
      <text x="25" y="155" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ffeebb">• 推测状态保存</text>
      <text x="25" y="180" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ffeebb">• 误预测恢复</text>
    </g>
    
    <!-- 全局历史寄存器 -->
    <g transform="translate(850, 0)" filter="url(#boxG3)">
      <rect x="0" y="0" width="250" height="400" rx="15" fill="rgba(50,0,80,0.3)" stroke="#aa88ff" stroke-width="2"/>
      <text x="125" y="35" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="22" fill="#bb99ff">全局历史寄存器</text>
      <line x1="20" y1="50" x2="230" y2="50" stroke="#aa88ff" opacity="0.4"/>
      
      <text x="25" y="80" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ccaaff">• 64-bit 历史长度</text>
      <text x="25" y="105" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ccaaff">• 分支结果移位</text>
      <text x="25" y="130" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ccaaff">• 推测更新</text>
      <text x="25" y="155" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ccaaff">• 检查点恢复</text>
      
      <line x1="20" y1="175" x2="230" y2="175" stroke="#aa88ff" opacity="0.3"/>
      <text x="125" y="200" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#bb99ff">历史模式</text>
      
      <!-- 历史位可视化 -->
      <g transform="translate(25, 220)">
        <rect x="0" y="0" width="200" height="25" rx="3" fill="rgba(170,136,255,0.2)" stroke="#aa88ff"/>
        <text x="100" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#ccaaff">1011010110101101...</text>
      </g>
      
      <text x="25" y="280" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ccaaff">历史长度配置:</text>
      <text x="35" y="305" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aa88ff">• T0: 4-bit</text>
      <text x="35" y="325" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aa88ff">• T1: 8-bit</text>
      <text x="35" y="345" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aa88ff">• T2: 16-bit</text>
      <text x="35" y="365" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aa88ff">• T3: 32-bit</text>
      <text x="35" y="385" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aa88ff">• T4: 64-bit</text>
    </g>
  </g>
  
  <!-- 性能指标 -->
  <g transform="translate(50, 600)">
    <rect x="0" y="0" width="1100" height="140" rx="12" fill="rgba(0,40,60,0.3)" stroke="#00aaff" stroke-width="1"/>
    <text x="550" y="35" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="22" fill="#00ddff" filter="url(#glow3)">预测性能指标</text>
    
    <g transform="translate(50, 60)">
      <rect x="0" y="0" width="180" height="60" rx="8" fill="rgba(0,255,170,0.15)" stroke="#00ffaa"/>
      <text x="90" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#00ffcc">整体准确率</text>
      <text x="90" y="48" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#ffffff">> 90%</text>
    </g>
    
    <g transform="translate(280, 60)">
      <rect x="0" y="0" width="180" height="60" rx="8" fill="rgba(255,204,0,0.15)" stroke="#ffcc00"/>
      <text x="90" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ffdd44">条件分支</text>
      <text x="90" y="48" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#ffffff">> 92%</text>
    </g>
    
    <g transform="translate(510, 60)">
      <rect x="0" y="0" width="180" height="60" rx="8" fill="rgba(255,136,255,0.15)" stroke="#ff88ff"/>
      <text x="90" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ffaaff">间接跳转</text>
      <text x="90" y="48" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#ffffff">> 85%</text>
    </g>
    
    <g transform="translate(740, 60)">
      <rect x="0" y="0" width="180" height="60" rx="8" fill="rgba(170,136,255,0.15)" stroke="#aa88ff"/>
      <text x="90" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#bb99ff">函数返回</text>
      <text x="90" y="48" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#ffffff">> 98%</text>
    </g>
    
    <g transform="translate(970, 60)">
      <rect x="0" y="0" width="80" height="60" rx="8" fill="rgba(0,200,255,0.15)" stroke="#00ccff"/>
      <text x="40" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#00ddff">延迟</text>
      <text x="40" y="48" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="18" fill="#ffffff">1周期</text>
    </g>
  </g>
  
  <text x="600" y="780" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#668888" opacity="0.7">RISC-V RV32IM 乱序执行处理器 · 分支预测单元</text>
</svg>