<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <!-- 深邃宇宙背景 -->
    <radialGradient id="cosmicBg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="40%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#000005"/>
    </radialGradient>
    
    <!-- 极光主渐变 -->
    <linearGradient id="auroraGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffc8;stop-opacity:1">
        <animate attributeName="stop-color" values="#00ffc8;#00ff88;#00ffc8" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#00a86b;stop-opacity:0.8"/>
    </linearGradient>
    
    <linearGradient id="auroraBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0.8"/>
    </linearGradient>
    
    <linearGradient id="auroraPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bf00ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#6600cc;stop-opacity:0.7"/>
    </linearGradient>
    
    <!-- 标题渐变 -->
    <linearGradient id="titleGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffc8"/>
      <stop offset="30%" style="stop-color:#00d4ff"/>
      <stop offset="70%" style="stop-color:#bf00ff"/>
      <stop offset="100%" style="stop-color:#00ffc8"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    
    <!-- 玻璃卡片效果 -->
    <linearGradient id="glassCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="4" result="blur2"/>
      <feGaussianBlur stdDeviation="2" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur3"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="starBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    
    <!-- 极光模糊 -->
    <filter id="auroraBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    
    <!-- 粒子效果 -->
    <radialGradient id="particle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- 宇宙背景 -->
  <rect width="1000" height="700" fill="url(#cosmicBg)"/>
  
  <!-- 银河星云层 -->
  <ellipse cx="300" cy="200" rx="400" ry="150" fill="#bf00ff" opacity="0.03" filter="url(#auroraBlur)">
    <animate attributeName="opacity" values="0.03;0.06;0.03" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="700" cy="500" rx="350" ry="120" fill="#00d4ff" opacity="0.025" filter="url(#auroraBlur)">
    <animate attributeName="opacity" values="0.025;0.05;0.025" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- 极光帘幕 - 更柔和更梦幻 -->
  <path d="M-100,50 Q150,20 400,60 T900,30 T1100,50" stroke="#00ffc8" stroke-width="80" fill="none" opacity="0.15" filter="url(#auroraBlur)">
    <animate attributeName="d" values="M-100,50 Q150,20 400,60 T900,30 T1100,50;M-100,30 Q150,60 400,25 T900,55 T1100,35;M-100,50 Q150,20 400,60 T900,30 T1100,50" dur="12s" repeatCount="indefinite"/>
  </path>
  <path d="M-100,90 Q200,50 500,100 T1100,70" stroke="#00d4ff" stroke-width="60" fill="none" opacity="0.12" filter="url(#auroraBlur)">
    <animate attributeName="d" values="M-100,90 Q200,50 500,100 T1100,70;M-100,70 Q200,100 500,60 T1100,90;M-100,90 Q200,50 500,100 T1100,70" dur="10s" repeatCount="indefinite"/>
  </path>
  <path d="M-100,130 Q300,90 600,140 T1100,110" stroke="#bf00ff" stroke-width="40" fill="none" opacity="0.08" filter="url(#auroraBlur)">
    <animate attributeName="d" values="M-100,130 Q300,90 600,140 T1100,110;M-100,110 Q300,140 600,100 T1100,130;M-100,130 Q300,90 600,140 T1100,110" dur="14s" repeatCount="indefinite"/>
  </path>
  
  <!-- 星星层 - 更密集更真实 -->
  <g id="stars">
    <!-- 大星星 -->
    <circle cx="80" cy="60" r="2" fill="white" filter="url(#starBlur)"><animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="120" r="2.5" fill="white" filter="url(#starBlur)"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="80" r="1.8" fill="white" filter="url(#starBlur)"><animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="50" r="2.2" fill="white" filter="url(#starBlur)"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="100" r="1.5" fill="white" filter="url(#starBlur)"><animate attributeName="opacity" values="1;0.5;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="70" r="2" fill="white" filter="url(#starBlur)"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="130" r="1.8" fill="white" filter="url(#starBlur)"><animate attributeName="opacity" values="1;0.4;1" dur="3.2s" repeatCount="indefinite"/></circle>
    <!-- 小星星 -->
    <circle cx="50" cy="150" r="1" fill="white" opacity="0.6"/>
    <circle cx="120" cy="90" r="0.8" fill="white" opacity="0.5"/>
    <circle cx="180" cy="180" r="1.2" fill="white" opacity="0.7"/>
    <circle cx="280" cy="140" r="0.9" fill="white" opacity="0.5"/>
    <circle cx="420" cy="110" r="1.1" fill="white" opacity="0.6"/>
    <circle cx="550" cy="160" r="0.8" fill="white" opacity="0.4"/>
    <circle cx="700" cy="140" r="1" fill="white" opacity="0.6"/>
    <circle cx="850" cy="180" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="950" cy="90" r="0.9" fill="white" opacity="0.7"/>
    <!-- 底部星星 -->
    <circle cx="60" cy="650" r="1.5" fill="white" filter="url(#starBlur)"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="620" r="1" fill="white" opacity="0.5"/>
    <circle cx="320" cy="660" r="1.8" fill="white" filter="url(#starBlur)"><animate attributeName="opacity" values="1;0.4;1" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="640" r="1.2" fill="white" opacity="0.6"/>
    <circle cx="620" cy="670" r="1.5" fill="white" filter="url(#starBlur)"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="630" r="1" fill="white" opacity="0.5"/>
    <circle cx="900" cy="660" r="1.8" fill="white" filter="url(#starBlur)"><animate attributeName="opacity" values="1;0.5;1" dur="4s" repeatCount="indefinite"/></circle>
  </g>
  
  <!-- 流星 -->
  <g>
    <line x1="850" y1="80" x2="780" y2="150" stroke="url(#auroraGreen)" stroke-width="2" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="4s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="x1" values="850;900;850" dur="4s" repeatCount="indefinite" begin="0s"/>
    </line>
    <line x1="200" y1="50" x2="130" y2="120" stroke="url(#auroraBlue)" stroke-width="1.5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="5s" repeatCount="indefinite" begin="2s"/>
    </line>
    <line x1="600" y1="30" x2="540" y2="90" stroke="url(#auroraPurple)" stroke-width="1.5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="6s" repeatCount="indefinite" begin="3.5s"/>
    </line>
  </g>
  
  <!-- 主标题 - 楷书风格 -->
  <text x="500" y="220" text-anchor="middle" fill="url(#titleGlow)" font-size="52" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#neonGlow)">
    RISC-V 乱序执行处理器
  </text>
  <text x="500" y="270" text-anchor="middle" fill="#00d4ff" font-size="22" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#softGlow)" opacity="0.9">
    完 整 测 试 报 告
  </text>
  <text x="500" y="305" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif">
    RV32IM + Zicsr · 七级流水线 · 乱序执行 · 精确异常
  </text>
  
  <!-- 主统计卡片 -->
  <rect x="150" y="330" width="700" height="100" rx="20" fill="url(#glassCard)" stroke="url(#auroraGreen)" stroke-width="1" opacity="0.9"/>
  <rect x="150" y="330" width="700" height="100" rx="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- 通过指示灯 -->
  <circle cx="220" cy="380" r="30" fill="#00ffc8" filter="url(#neonGlow)" opacity="0.9">
    <animate attributeName="r" values="30;33;30" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="220" y="390" text-anchor="middle" fill="#0a0a1a" font-size="28" font-weight="bold">✓</text>
  
  <!-- 统计数据 -->
  <text x="340" y="365" fill="rgba(255,255,255,0.6)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif">测试状态</text>
  <text x="340" y="400" fill="#00ffc8" font-size="32" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#softGlow)">11/12 通过</text>
  
  <text x="540" y="365" fill="rgba(255,255,255,0.6)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif">单元测试</text>
  <text x="540" y="400" fill="#00ffc8" font-size="32" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#softGlow)">全部通过</text>
  
  <text x="740" y="365" fill="rgba(255,255,255,0.6)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif">总通过率</text>
  <text x="740" y="400" fill="#00ffc8" font-size="32" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#softGlow)">91.7%</text>
  
  <!-- 测试模块网格 - 第一行 -->
  <g transform="translate(60, 460)">
    <rect x="0" y="0" width="160" height="80" rx="12" fill="url(#glassCard)" stroke="#00ffc8" stroke-width="1"/>
    <circle cx="30" cy="40" r="14" fill="#00ffc8" filter="url(#softGlow)"/>
    <text x="30" y="46" text-anchor="middle" fill="#0a0a1a" font-size="14" font-weight="bold">✓</text>
    <text x="100" y="35" text-anchor="middle" fill="#00ffc8" font-size="16" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">算术逻辑</text>
    <text x="100" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">12007/12007</text>
  </g>
  
  <g transform="translate(240, 460)">
    <rect x="0" y="0" width="160" height="80" rx="12" fill="url(#glassCard)" stroke="#00ffc8" stroke-width="1"/>
    <circle cx="30" cy="40" r="14" fill="#00ffc8" filter="url(#softGlow)"/>
    <text x="30" y="46" text-anchor="middle" fill="#0a0a1a" font-size="14" font-weight="bold">✓</text>
    <text x="100" y="35" text-anchor="middle" fill="#00ffc8" font-size="16" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">乘法器</text>
    <text x="100" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">104/104</text>
  </g>
  
  <g transform="translate(420, 460)">
    <rect x="0" y="0" width="160" height="80" rx="12" fill="url(#glassCard)" stroke="#00ffc8" stroke-width="1"/>
    <circle cx="30" cy="40" r="14" fill="#00ffc8" filter="url(#softGlow)"/>
    <text x="30" y="46" text-anchor="middle" fill="#0a0a1a" font-size="14" font-weight="bold">✓</text>
    <text x="100" y="35" text-anchor="middle" fill="#00ffc8" font-size="16" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">除法器</text>
    <text x="100" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">105/105</text>
  </g>
  
  <g transform="translate(600, 460)">
    <rect x="0" y="0" width="160" height="80" rx="12" fill="url(#glassCard)" stroke="#ffd700" stroke-width="1"/>
    <circle cx="30" cy="40" r="14" fill="#ffd700" filter="url(#softGlow)">
      <animate attributeName="opacity" values="1;0.6;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="46" text-anchor="middle" fill="#0a0a1a" font-size="14" font-weight="bold">⚠</text>
    <text x="100" y="35" text-anchor="middle" fill="#ffd700" font-size="16" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">译码器</text>
    <text x="100" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">74/76</text>
  </g>
  
  <g transform="translate(780, 460)">
    <rect x="0" y="0" width="160" height="80" rx="12" fill="url(#glassCard)" stroke="#00ffc8" stroke-width="1"/>
    <circle cx="30" cy="40" r="14" fill="#00ffc8" filter="url(#softGlow)"/>
    <text x="30" y="46" text-anchor="middle" fill="#0a0a1a" font-size="14" font-weight="bold">✓</text>
    <text x="100" y="35" text-anchor="middle" fill="#00ffc8" font-size="16" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">分支单元</text>
    <text x="100" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">361/361</text>
  </g>
  
  <!-- 测试模块网格 - 第二行 -->
  <g transform="translate(60, 555)">
    <rect x="0" y="0" width="160" height="80" rx="12" fill="url(#glassCard)" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="30" cy="40" r="14" fill="#00d4ff" filter="url(#softGlow)"/>
    <text x="30" y="46" text-anchor="middle" fill="#0a0a1a" font-size="14" font-weight="bold">✓</text>
    <text x="100" y="35" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">分支预测</text>
    <text x="100" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">6/6</text>
  </g>
  
  <g transform="translate(240, 555)">
    <rect x="0" y="0" width="160" height="80" rx="12" fill="url(#glassCard)" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="30" cy="40" r="14" fill="#00d4ff" filter="url(#softGlow)"/>
    <text x="30" y="46" text-anchor="middle" fill="#0a0a1a" font-size="14" font-weight="bold">✓</text>
    <text x="100" y="35" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">高速缓存</text>
    <text x="100" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">12/12</text>
  </g>
  
  <g transform="translate(420, 555)">
    <rect x="0" y="0" width="160" height="80" rx="12" fill="url(#glassCard)" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="30" cy="40" r="14" fill="#00d4ff" filter="url(#softGlow)"/>
    <text x="30" y="46" text-anchor="middle" fill="#0a0a1a" font-size="14" font-weight="bold">✓</text>
    <text x="100" y="35" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">存储队列</text>
    <text x="100" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">12/12</text>
  </g>
  
  <g transform="translate(600, 555)">
    <rect x="0" y="0" width="160" height="80" rx="12" fill="url(#glassCard)" stroke="#bf00ff" stroke-width="1"/>
    <circle cx="30" cy="40" r="14" fill="#bf00ff" filter="url(#softGlow)"/>
    <text x="30" y="46" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">✓</text>
    <text x="100" y="35" text-anchor="middle" fill="#bf00ff" font-size="16" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">异常处理</text>
    <text x="100" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">10/10</text>
  </g>
  
  <g transform="translate(780, 555)">
    <rect x="0" y="0" width="160" height="80" rx="12" fill="url(#glassCard)" stroke="#bf00ff" stroke-width="1"/>
    <circle cx="30" cy="40" r="14" fill="#bf00ff" filter="url(#softGlow)"/>
    <text x="30" y="46" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">✓</text>
    <text x="100" y="35" text-anchor="middle" fill="#bf00ff" font-size="16" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">流水线</text>
    <text x="100" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">11/11</text>
  </g>
</svg>