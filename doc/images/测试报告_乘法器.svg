<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <radialGradient id="bg2" cx="60%" cy="30%" r="75%">
      <stop offset="0%" style="stop-color:#1a0f2e"/>
      <stop offset="50%" style="stop-color:#0a0810"/>
      <stop offset="100%" style="stop-color:#030205"/>
    </radialGradient>
    
    <linearGradient id="aurora2a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffc8"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#bf00ff"/>
    </linearGradient>
    
    <linearGradient id="aurora2b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffc8"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00ffc8"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    
    <linearGradient id="glass2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
    
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="3" result="blur2"/>
      <feMerge><feMergeNode in="blur1"/><feMergeNode in="blur2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <filter id="auroraBlur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>
  
  <rect width="900" height="550" fill="url(#bg2)"/>
  
  <!-- 星云 -->
  <ellipse cx="250" cy="180" rx="280" ry="100" fill="#bf00ff" opacity="0.035" filter="url(#auroraBlur2)"/>
  <ellipse cx="650" cy="380" rx="220" ry="90" fill="#00d4ff" opacity="0.03" filter="url(#auroraBlur2)"/>
  
  <!-- 极光 -->
  <path d="M-50,35 Q220,5 480,45 T950,25" stroke="#00ffc8" stroke-width="55" fill="none" opacity="0.1" filter="url(#auroraBlur2)">
    <animate attributeName="d" values="M-50,35 Q220,5 480,45 T950,25;M-50,20 Q220,50 480,15 T950,40;M-50,35 Q220,5 480,45 T950,25" dur="11s" repeatCount="indefinite"/>
  </path>
  <path d="M-50,75 Q280,40 580,85 T950,60" stroke="#00d4ff" stroke-width="35" fill="none" opacity="0.07" filter="url(#auroraBlur2)">
    <animate attributeName="d" values="M-50,75 Q280,40 580,85 T950,60;M-50,60 Q280,85 580,50 T950,75;M-50,75 Q280,40 580,85 T950,60" dur="13s" repeatCount="indefinite"/>
  </path>
  <path d="M-50,110 Q350,75 700,115 T950,95" stroke="#bf00ff" stroke-width="25" fill="none" opacity="0.05" filter="url(#auroraBlur2)">
    <animate attributeName="d" values="M-50,110 Q350,75 700,115 T950,95;M-50,95 Q350,115 700,80 T950,110;M-50,110 Q350,75 700,115 T950,95" dur="15s" repeatCount="indefinite"/>
  </path>
  
  <!-- 星星 -->
  <circle cx="70" cy="55" r="1.8" fill="white" opacity="0.85"><animate attributeName="opacity" values="0.85;0.3;0.85" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="180" cy="95" r="1.3" fill="white" opacity="0.6"/>
  <circle cx="320" cy="65" r="2" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.35;0.9" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="480" cy="50" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="620" cy="85" r="1.8" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.6s" repeatCount="indefinite"/></circle>
  <circle cx="760" cy="60" r="1.4" fill="white" opacity="0.65"/>
  <circle cx="860" cy="100" r="2" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="510" r="1.6" fill="white" opacity="0.7"/>
  <circle cx="350" cy="525" r="1.8" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.35;0.8" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="600" cy="515" r="1.3" fill="white" opacity="0.6"/>
  <circle cx="800" cy="535" r="1.7" fill="white" opacity="0.75"/>
  
  <!-- 流星 -->
  <line x1="820" y1="70" x2="760" y2="130" stroke="url(#aurora2a)" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0.85;0" dur="4.5s" repeatCount="indefinite"/>
  </line>
  
  <!-- 乘法符号装饰 -->
  <text x="80" y="280" fill="#00ffc8" font-size="60" font-weight="bold" opacity="0.15" filter="url(#glow2)">×</text>
  
  <!-- 主卡片 -->
  <rect x="100" y="160" width="700" height="280" rx="25" fill="url(#glass2)" stroke="url(#aurora2b)" stroke-width="1.5"/>
  
  <!-- 状态指示灯 -->
  <circle cx="170" cy="230" r="35" fill="#00ffc8" filter="url(#glow2)" opacity="0.95">
    <animate attributeName="r" values="35;38;35" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="170" y="242" text-anchor="middle" fill="#030205" font-size="32" font-weight="bold">✓</text>
  
  <!-- 标题 -->
  <text x="480" y="225" text-anchor="middle" fill="url(#aurora2b)" font-size="42" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#glow2)">乘法器单元测试</text>
  <text x="480" y="265" text-anchor="middle" fill="#00d4ff" font-size="16" font-family="KaiTi, STKaiti, 楷体, serif" opacity="0.8">RV32M扩展 · MUL/MULH/MULHSU/MULHU</text>
  
  <!-- 统计数据 -->
  <text x="220" y="330" fill="rgba(255,255,255,0.5)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif">测试总数</text>
  <text x="220" y="370" fill="#00ffc8" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">104</text>
  
  <text x="450" y="330" fill="rgba(255,255,255,0.5)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="middle">通过率</text>
  <text x="450" y="370" fill="#00ffc8" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="middle">100%</text>
  
  <text x="680" y="330" fill="rgba(255,255,255,0.5)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="end">流水线延迟</text>
  <text x="680" y="370" fill="#00d4ff" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="end">3周期</text>
  
  <!-- 边界测试标签 -->
  <g transform="translate(150, 400)">
    <rect x="0" y="0" width="120" height="35" rx="10" fill="rgba(0,255,200,0.1)" stroke="#00ffc8" stroke-width="1"/>
    <text x="60" y="24" text-anchor="middle" fill="#00ffc8" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif">零乘法</text>
  </g>
  <g transform="translate(290, 400)">
    <rect x="0" y="0" width="120" height="35" rx="10" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
    <text x="60" y="24" text-anchor="middle" fill="#00d4ff" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif">单位乘法</text>
  </g>
  <g transform="translate(430, 400)">
    <rect x="0" y="0" width="120" height="35" rx="10" fill="rgba(191,0,255,0.1)" stroke="#bf00ff" stroke-width="1"/>
    <text x="60" y="24" text-anchor="middle" fill="#bf00ff" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif">有符号边界</text>
  </g>
  <g transform="translate(570, 400)">
    <rect x="0" y="0" width="120" height="35" rx="10" fill="rgba(0,255,200,0.1)" stroke="#00ffc8" stroke-width="1"/>
    <text x="60" y="24" text-anchor="middle" fill="#00ffc8" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif">无符号边界</text>
  </g>
  
  <!-- 底部说明 -->
  <text x="450" y="490" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">
    三周期流水线延迟模型 · PRD/ROB索引传递验证
  </text>
</svg>