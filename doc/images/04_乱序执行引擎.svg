<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080820"/>
      <stop offset="50%" style="stop-color:#0a2535"/>
      <stop offset="100%" style="stop-color:#051818"/>
    </linearGradient>
    <linearGradient id="auroraA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff77;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00ffbb;stop-opacity:0.65"/>
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="auroraB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0077ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00ddff;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#00ff99;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow4"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="boxG4"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  
  <rect width="1200" height="900" fill="url(#bg4)"/>
  
  <!-- 星空 -->
  <g opacity="0.8">
    <circle cx="70" cy="45" r="1.5" fill="#fff"/><circle cx="190" cy="75" r="1" fill="#adf"/>
    <circle cx="330" cy="40" r="2" fill="#fff"/><circle cx="490" cy="85" r="1" fill="#8cf"/>
    <circle cx="630" cy="30" r="1.5" fill="#fff"/><circle cx="790" cy="65" r="1" fill="#adf"/>
    <circle cx="930" cy="50" r="2" fill="#fff"/><circle cx="1090" cy="80" r="1" fill="#8cf"/>
    <circle cx="110" cy="140" r="1" fill="#fff"/><circle cx="360" cy="120" r="1.5" fill="#adf"/>
    <circle cx="660" cy="130" r="1" fill="#fff"/><circle cx="960" cy="110" r="1.5" fill="#8cf"/>
    <circle cx="55" cy="860" r="1" fill="#fff"/><circle cx="260" cy="880" r="1.5" fill="#adf"/>
    <circle cx="560" cy="850" r="1" fill="#fff"/><circle cx="860" cy="870" r="2" fill="#8cf"/>
    <circle cx="1110" cy="840" r="1" fill="#fff"/>
  </g>
  
  <!-- 极光 -->
  <ellipse cx="600" cy="110" rx="520" ry="65" fill="url(#auroraA)" opacity="0.4"/>
  <ellipse cx="420" cy="150" rx="380" ry="50" fill="url(#auroraB)" opacity="0.3"/>
  
  <!-- 标题 -->
  <text x="600" y="75" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="46" fill="#00ffcc" filter="url(#glow4)">乱序执行引擎</text>
  <text x="600" y="115" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#88ddff">Out-of-Order Execution Engine · Tomasulo 算法实现</text>

  <!-- 主架构图 -->
  <g transform="translate(50, 160)">
    <!-- RAT 寄存器别名表 -->
    <g filter="url(#boxG4)">
      <rect x="0" y="0" width="200" height="200" rx="12" fill="rgba(0,80,100,0.35)" stroke="#00ccff" stroke-width="2"/>
      <text x="100" y="32" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#00ddff">RAT 寄存器别名表</text>
      <line x1="15" y1="45" x2="185" y2="45" stroke="#00ccff" opacity="0.4"/>
      <text x="20" y="75" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 32 架构寄存器映射</text>
      <text x="20" y="100" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 64 物理寄存器索引</text>
      <text x="20" y="125" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 推测状态表</text>
      <text x="20" y="150" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 提交状态表</text>
      <text x="20" y="175" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 快速恢复支持</text>
    </g>
    
    <!-- Free List 空闲列表 -->
    <g transform="translate(0, 220)" filter="url(#boxG4)">
      <rect x="0" y="0" width="200" height="180" rx="12" fill="rgba(80,60,0,0.35)" stroke="#ffcc00" stroke-width="2"/>
      <text x="100" y="32" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#ffdd44">Free List 空闲列表</text>
      <line x1="15" y1="45" x2="185" y2="45" stroke="#ffcc00" opacity="0.4"/>
      <text x="20" y="75" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ffeebb">• 64 物理寄存器池</text>
      <text x="20" y="100" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ffeebb">• FIFO 分配策略</text>
      <text x="20" y="125" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ffeebb">• 提交时释放</text>
      <text x="20" y="150" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ffeebb">• 回滚恢复</text>
    </g>
    
    <!-- ROB 重排序缓冲 -->
    <g transform="translate(250, 0)" filter="url(#boxG4)">
      <rect x="0" y="0" width="280" height="400" rx="12" fill="rgba(0,100,80,0.35)" stroke="#00ffaa" stroke-width="2"/>
      <text x="140" y="32" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="22" fill="#00ffcc">ROB 重排序缓冲</text>
      <line x1="15" y1="48" x2="265" y2="48" stroke="#00ffaa" opacity="0.4"/>
      
      <text x="20" y="80" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• 32 项循环队列</text>
      <text x="20" y="105" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• 顺序提交保证</text>
      <text x="20" y="130" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• 精确异常支持</text>
      
      <line x1="20" y1="150" x2="260" y2="150" stroke="#00ffaa" opacity="0.3"/>
      <text x="140" y="175" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">ROB 项结构</text>
      
      <!-- ROB 项示意 -->
      <g transform="translate(20, 190)">
        <rect x="0" y="0" width="240" height="30" rx="4" fill="rgba(0,255,170,0.15)" stroke="#00ffaa"/>
        <text x="10" y="20" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaffcc">PC | 目标寄存器 | 值 | 完成位 | 异常</text>
      </g>
      
      <text x="20" y="250" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaffcc">功能:</text>
      <text x="30" y="275" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#88ddcc">• 保持程序顺序</text>
      <text x="30" y="295" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#88ddcc">• 存储推测结果</text>
      <text x="30" y="315" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#88ddcc">• 异常检测点</text>
      <text x="30" y="335" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#88ddcc">• 分支恢复点</text>
      <text x="30" y="355" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#88ddcc">• 寄存器释放控制</text>
      <text x="30" y="375" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#88ddcc">• Store 提交控制</text>
    </g>
    
    <!-- 保留站 -->
    <g transform="translate(580, 0)" filter="url(#boxG4)">
      <rect x="0" y="0" width="280" height="400" rx="12" fill="rgba(80,0,80,0.35)" stroke="#ff88ff" stroke-width="2"/>
      <text x="140" y="32" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="22" fill="#ffaaff">保留站 RS</text>
      <line x1="15" y1="48" x2="265" y2="48" stroke="#ff88ff" opacity="0.4"/>
      
      <text x="20" y="80" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ffccff">• 4 项/功能单元</text>
      <text x="20" y="105" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ffccff">• 动态调度</text>
      <text x="20" y="130" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ffccff">• 操作数监听</text>
      
      <line x1="20" y1="150" x2="260" y2="150" stroke="#ff88ff" opacity="0.3"/>
      <text x="140" y="175" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#ffaaff">RS 项结构</text>
      
      <g transform="translate(20, 190)">
        <rect x="0" y="0" width="240" height="30" rx="4" fill="rgba(255,136,255,0.15)" stroke="#ff88ff"/>
        <text x="10" y="20" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ffccff">Op | Src1 | V1 | Src2 | V2 | Dest | ROB#</text>
      </g>
      
      <text x="20" y="250" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ffccff">功能单元分配:</text>
      <text x="30" y="275" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ddaadd">• RS_ALU: 4项 (整数运算)</text>
      <text x="30" y="295" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ddaadd">• RS_MUL: 4项 (乘法)</text>
      <text x="30" y="315" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ddaadd">• RS_DIV: 4项 (除法)</text>
      <text x="30" y="335" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ddaadd">• RS_BRU: 4项 (分支)</text>
      <text x="30" y="355" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ddaadd">• RS_LSU: 4项 (访存)</text>
      <text x="30" y="375" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ddaadd">总计: 20 项</text>
    </g>
    
    <!-- PRF 物理寄存器文件 -->
    <g transform="translate(910, 0)" filter="url(#boxG4)">
      <rect x="0" y="0" width="200" height="200" rx="12" fill="rgba(0,60,80,0.35)" stroke="#00aaff" stroke-width="2"/>
      <text x="100" y="32" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#00ccff">PRF 物理寄存器</text>
      <line x1="15" y1="45" x2="185" y2="45" stroke="#00aaff" opacity="0.4"/>
      <text x="20" y="75" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 64 x 32-bit 寄存器</text>
      <text x="20" y="100" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 4 读端口</text>
      <text x="20" y="125" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 2 写端口</text>
      <text x="20" y="150" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 旁路网络</text>
      <text x="20" y="175" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 就绪位跟踪</text>
    </g>
    
    <!-- CDB 公共数据总线 -->
    <g transform="translate(910, 220)" filter="url(#boxG4)">
      <rect x="0" y="0" width="200" height="180" rx="12" fill="rgba(100,50,0,0.35)" stroke="#ff8800" stroke-width="2"/>
      <text x="100" y="32" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#ffaa44">CDB 公共数据总线</text>
      <line x1="15" y1="45" x2="185" y2="45" stroke="#ff8800" opacity="0.4"/>
      <text x="20" y="75" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ffcc88">• 结果广播</text>
      <text x="20" y="100" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ffcc88">• 唤醒等待指令</text>
      <text x="20" y="125" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ffcc88">• ROB 更新</text>
      <text x="20" y="150" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ffcc88">• 2 条总线</text>
    </g>
  </g>
  
  <!-- 数据流说明 -->
  <g transform="translate(50, 600)">
    <rect x="0" y="0" width="1100" height="240" rx="12" fill="rgba(0,40,60,0.3)" stroke="#00aaff" stroke-width="1"/>
    <text x="550" y="35" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="22" fill="#00ddff" filter="url(#glow4)">乱序执行数据流</text>
    
    <g transform="translate(30, 60)">
      <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">① 重命名阶段</text>
      <text x="20" y="25" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">查询 RAT 获取源操作数物理寄存器，从 Free List 分配目标物理寄存器，更新 RAT 映射</text>
      
      <text x="0" y="60" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#ffcc00">② 分发阶段</text>
      <text x="20" y="85" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ffeebb">指令进入 ROB 分配项，同时进入对应功能单元的保留站等待发射</text>
      
      <text x="0" y="120" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#ff88ff">③ 发射阶段</text>
      <text x="20" y="145" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ffccff">保留站监听 CDB，操作数就绪后选择最老指令发射到功能单元执行</text>
      
      <text x="0" y="180" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffaa">④ 提交阶段</text>
      <text x="20" y="205" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaffcc">ROB 头部指令完成后顺序提交，更新架构状态，释放旧物理寄存器到 Free List</text>
    </g>
    
    <g transform="translate(600, 60)">
      <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00aaff">关键优化技术</text>
      <text x="20" y="30" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 寄存器重命名消除 WAW/WAR 假依赖</text>
      <text x="20" y="55" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 动态调度提高功能单元利用率</text>
      <text x="20" y="80" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• CDB 广播实现快速唤醒</text>
      <text x="20" y="105" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• ROB 支持精确异常和推测执行</text>
      <text x="20" y="130" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 检查点机制加速分支恢复</text>
      <text x="20" y="155" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 旁路网络减少数据冒险停顿</text>
      <text x="20" y="180" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#aaddff">• 多发射提高指令吞吐量</text>
    </g>
  </g>
  
  <text x="600" y="880" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#668888" opacity="0.7">RISC-V RV32IM 乱序执行处理器 · 乱序执行引擎</text>
</svg>