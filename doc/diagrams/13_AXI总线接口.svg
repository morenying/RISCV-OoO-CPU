<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/><stop offset="50%" style="stop-color:#0d2040"/><stop offset="100%" style="stop-color:#051a1a"/>
    </linearGradient>
    <linearGradient id="au13" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8888ff;stop-opacity:0"/><stop offset="50%" style="stop-color:#aaaaff;stop-opacity:0.5"/><stop offset="100%" style="stop-color:#00ccff;stop-opacity:0"/>
    </linearGradient>
    <filter id="g13"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg13)"/>
  <g opacity="0.7">
    <circle cx="40" cy="30" r="1.5" fill="#fff"/><circle cx="150" cy="50" r="1" fill="#adf"/><circle cx="300" cy="25" r="2" fill="#fff"/>
    <circle cx="500" cy="45" r="1" fill="#8cf"/><circle cx="650" cy="35" r="1.5" fill="#fff"/><circle cx="760" cy="55" r="1" fill="#adf"/>
    <circle cx="80" cy="420" r="1" fill="#fff"/><circle cx="400" cy="430" r="1.5" fill="#adf"/><circle cx="720" cy="425" r="1" fill="#8cf"/>
  </g>
  <ellipse cx="400" cy="60" rx="300" ry="40" fill="url(#au13)" opacity="0.4"/>
  
  <text x="400" y="55" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="32" fill="#aaaaff" filter="url(#g13)">AXI 总线接口</text>
  <text x="400" y="85" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#8888ff">AXI4 Master Interface · 缓存与内存通信</text>
  
  <g transform="translate(40, 115)">
    <rect x="0" y="0" width="180" height="150" rx="10" fill="rgba(0,100,80,0.3)" stroke="#00ffaa" stroke-width="1.5"/>
    <text x="90" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="15" fill="#00ffcc">I-Bus 指令总线</text>
    <line x1="10" y1="35" x2="170" y2="35" stroke="#00ffaa" opacity="0.3"/>
    <text x="15" y="58" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaffcc">• I-Cache 缺失填充</text>
    <text x="15" y="78" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaffcc">• 只读通道</text>
    <text x="15" y="98" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaffcc">• 32字节突发</text>
    <text x="15" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaffcc">• 8拍传输</text>
    <text x="15" y="138" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaffcc">• 优先级较低</text>
  </g>
  
  <g transform="translate(240, 115)">
    <rect x="0" y="0" width="180" height="150" rx="10" fill="rgba(0,80,100,0.3)" stroke="#00aaff" stroke-width="1.5"/>
    <text x="90" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="15" fill="#00ccff">D-Bus 数据总线</text>
    <line x1="10" y1="35" x2="170" y2="35" stroke="#00aaff" opacity="0.3"/>
    <text x="15" y="58" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">• D-Cache 缺失填充</text>
    <text x="15" y="78" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">• 脏数据写回</text>
    <text x="15" y="98" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">• 读写双向</text>
    <text x="15" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">• 32字节突发</text>
    <text x="15" y="138" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">• 优先级较高</text>
  </g>
  
  <g transform="translate(440, 115)">
    <rect x="0" y="0" width="320" height="150" rx="10" fill="rgba(60,60,100,0.3)" stroke="#8888ff" stroke-width="1.5"/>
    <text x="160" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="15" fill="#aaaaff">AXI4 通道</text>
    <line x1="10" y1="35" x2="310" y2="35" stroke="#8888ff" opacity="0.3"/>
    
    <text x="15" y="58" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ccccff">写地址通道 (AW): AWADDR, AWLEN, AWSIZE...</text>
    <text x="15" y="78" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ccccff">写数据通道 (W): WDATA, WSTRB, WLAST...</text>
    <text x="15" y="98" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ccccff">写响应通道 (B): BRESP, BVALID...</text>
    <text x="15" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">读地址通道 (AR): ARADDR, ARLEN, ARSIZE...</text>
    <text x="15" y="138" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">读数据通道 (R): RDATA, RRESP, RLAST...</text>
  </g>
  
  <g transform="translate(40, 280)">
    <rect x="0" y="0" width="720" height="130" rx="8" fill="rgba(0,40,60,0.25)" stroke="#8888ff" stroke-width="1"/>
    <text x="360" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaaaff">总线特性</text>
    
    <text x="20" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ccccff">协议参数:</text>
    <text x="20" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaaadd">• 数据宽度: 32位</text>
    <text x="20" y="88" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaaadd">• 地址宽度: 32位</text>
    <text x="20" y="106" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaaadd">• 突发类型: INCR</text>
    
    <text x="200" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ccccff">传输模式:</text>
    <text x="200" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaaadd">• 突发长度: 8拍</text>
    <text x="200" y="88" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaaadd">• 缓存行: 32字节</text>
    <text x="200" y="106" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaaadd">• 独立读写通道</text>
    
    <text x="400" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ccccff">功能支持:</text>
    <text x="400" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaaadd">• 未对齐访问处理</text>
    <text x="400" y="88" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaaadd">• 错误响应处理</text>
    <text x="400" y="106" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaaadd">• 非缓存访问</text>
    
    <text x="580" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ccccff">性能:</text>
    <text x="580" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaaadd">• 流水线请求</text>
    <text x="580" y="88" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaaadd">• 乱序响应</text>
    <text x="580" y="106" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaaadd">• ID标签支持</text>
  </g>
  
  <text x="400" y="435" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="10" fill="#668888" opacity="0.7">AXI4 · 总线接口</text>
</svg>