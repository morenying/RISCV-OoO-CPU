<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/><stop offset="50%" style="stop-color:#0d2040"/><stop offset="100%" style="stop-color:#051a1a"/>
    </linearGradient>
    <linearGradient id="au14" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6666;stop-opacity:0"/><stop offset="50%" style="stop-color:#ff8888;stop-opacity:0.5"/><stop offset="100%" style="stop-color:#ffaa00;stop-opacity:0"/>
    </linearGradient>
    <filter id="g14"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg14)"/>
  <g opacity="0.7">
    <circle cx="40" cy="30" r="1.5" fill="#fff"/><circle cx="150" cy="50" r="1" fill="#adf"/><circle cx="300" cy="25" r="2" fill="#fff"/>
    <circle cx="500" cy="45" r="1" fill="#8cf"/><circle cx="650" cy="35" r="1.5" fill="#fff"/><circle cx="760" cy="55" r="1" fill="#adf"/>
    <circle cx="80" cy="420" r="1" fill="#fff"/><circle cx="400" cy="430" r="1.5" fill="#adf"/><circle cx="720" cy="425" r="1" fill="#8cf"/>
  </g>
  <ellipse cx="400" cy="60" rx="300" ry="40" fill="url(#au14)" opacity="0.4"/>
  
  <text x="400" y="55" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="32" fill="#ff8888" filter="url(#g14)">异常处理单元</text>
  <text x="400" y="85" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ff6666">Exception Unit · 精确异常 · CSR 管理</text>
  
  <g transform="translate(40, 115)">
    <rect x="0" y="0" width="220" height="160" rx="10" fill="rgba(100,50,50,0.3)" stroke="#ff6666" stroke-width="1.5"/>
    <text x="110" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#ff8888">支持的异常</text>
    <line x1="10" y1="35" x2="210" y2="35" stroke="#ff6666" opacity="0.3"/>
    <text x="15" y="58" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffaaaa">• 指令地址未对齐</text>
    <text x="15" y="78" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffaaaa">• 非法指令</text>
    <text x="15" y="98" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffaaaa">• Load 地址未对齐</text>
    <text x="15" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffaaaa">• Store 地址未对齐</text>
    <text x="15" y="138" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffaaaa">• ECALL / EBREAK</text>
  </g>
  
  <g transform="translate(280, 115)">
    <rect x="0" y="0" width="240" height="160" rx="10" fill="rgba(80,60,0,0.3)" stroke="#ccaa00" stroke-width="1.5"/>
    <text x="120" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#ddbb44">CSR 寄存器</text>
    <line x1="10" y1="35" x2="230" y2="35" stroke="#ccaa00" opacity="0.3"/>
    <text x="15" y="58" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#eeddbb">• mstatus: 机器状态</text>
    <text x="15" y="78" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#eeddbb">• mie/mip: 中断使能/挂起</text>
    <text x="15" y="98" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#eeddbb">• mtvec: 陷阱向量基址</text>
    <text x="15" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#eeddbb">• mepc: 异常PC</text>
    <text x="15" y="138" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#eeddbb">• mcause/mtval: 原因/值</text>
  </g>
  
  <g transform="translate(540, 115)">
    <rect x="0" y="0" width="220" height="160" rx="10" fill="rgba(0,80,100,0.3)" stroke="#00aaff" stroke-width="1.5"/>
    <text x="110" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ccff">性能计数器</text>
    <line x1="10" y1="35" x2="210" y2="35" stroke="#00aaff" opacity="0.3"/>
    <text x="15" y="58" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">• mcycle: 周期计数</text>
    <text x="15" y="78" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">• minstret: 指令计数</text>
    <text x="15" y="98" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">• 分支预测统计</text>
    <text x="15" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">• 缓存命中统计</text>
    <text x="15" y="138" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">• 流水线停顿统计</text>
  </g>
  
  <g transform="translate(40, 290)">
    <rect x="0" y="0" width="720" height="120" rx="8" fill="rgba(0,40,60,0.25)" stroke="#ff6666" stroke-width="1"/>
    <text x="360" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ff8888">异常处理流程</text>
    
    <text x="20" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffaaaa">1. 异常检测:</text>
    <text x="20" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ff8888">各阶段检测异常，记录到ROB项</text>
    
    <text x="200" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffaaaa">2. 精确异常:</text>
    <text x="200" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ff8888">ROB头部提交时处理异常</text>
    
    <text x="380" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffaaaa">3. 状态保存:</text>
    <text x="380" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ff8888">保存mepc, mcause, mtval</text>
    
    <text x="560" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffaaaa">4. 跳转处理:</text>
    <text x="560" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ff8888">PC跳转到mtvec</text>
    
    <text x="20" y="100" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">恢复: MRET指令从mepc恢复执行，恢复mstatus状态</text>
  </g>
  
  <text x="400" y="435" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="10" fill="#668888" opacity="0.7">Exception · 异常处理</text>
</svg>