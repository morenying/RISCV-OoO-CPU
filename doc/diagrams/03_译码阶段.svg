    </linearGradient>
    <linearGradient id="au3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00aaff;stop-opacity:0"/><stop offset="50%" style="stop-color:#00ddff;stop-opacity:0.5"/><stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </linearGradient>
    <filter id="g3"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>
