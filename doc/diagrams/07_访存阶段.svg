<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/><stop offset="50%" style="stop-color:#0d2040"/><stop offset="100%" style="stop-color:#051a1a"/>
    </linearGradient>
    <linearGradient id="au7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00cccc;stop-opacity:0"/><stop offset="50%" style="stop-color:#00eeee;stop-opacity:0.5"/><stop offset="100%" style="stop-color:#00aaff;stop-opacity:0"/>
    </linearGradient>
    <filter id="g7"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg7)"/>
  <g opacity="0.7">
    <circle cx="40" cy="30" r="1.5" fill="#fff"/><circle cx="150" cy="50" r="1" fill="#adf"/><circle cx="300" cy="25" r="2" fill="#fff"/>
    <circle cx="500" cy="45" r="1" fill="#8cf"/><circle cx="650" cy="35" r="1.5" fill="#fff"/><circle cx="760" cy="55" r="1" fill="#adf"/>
    <circle cx="80" cy="420" r="1" fill="#fff"/><circle cx="400" cy="430" r="1.5" fill="#adf"/><circle cx="720" cy="425" r="1" fill="#8cf"/>
  </g>
  <ellipse cx="400" cy="60" rx="300" ry="40" fill="url(#au7)" opacity="0.4"/>
  
  <text x="400" y="55" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="32" fill="#00eeee" filter="url(#g7)">访存阶段 MEM Stage</text>
  <text x="400" y="85" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#00cccc">Memory Stage · D-Cache 访问与 LSQ 管理</text>
  
  <g transform="translate(40, 115)">
    <rect x="0" y="0" width="180" height="140" rx="10" fill="rgba(0,100,100,0.3)" stroke="#00dddd" stroke-width="1.5"/>
    <text x="90" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00eeee">D-Cache 接口</text>
    <line x1="10" y1="35" x2="170" y2="35" stroke="#00dddd" opacity="0.3"/>
    <text x="15" y="58" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffff">• 发送访存请求</text>
    <text x="15" y="78" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffff">• 接收数据响应</text>
    <text x="15" y="98" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffff">• 处理缓存缺失</text>
    <text x="15" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffff">• 写回脏数据</text>
  </g>
  
  <g transform="translate(240, 115)">
    <rect x="0" y="0" width="160" height="140" rx="10" fill="rgba(80,80,0,0.3)" stroke="#cccc00" stroke-width="1.5"/>
    <text x="80" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#dddd44">Load Queue</text>
    <line x1="10" y1="35" x2="150" y2="35" stroke="#cccc00" opacity="0.3"/>
    <text x="15" y="58" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#eeeebb">• 8 项深度</text>
    <text x="15" y="78" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#eeeebb">• 乱序完成</text>
    <text x="15" y="98" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#eeeebb">• 推测执行</text>
    <text x="15" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#eeeebb">• 依赖检测</text>
  </g>
  
  <g transform="translate(420, 115)">
    <rect x="0" y="0" width="160" height="140" rx="10" fill="rgba(100,50,80,0.3)" stroke="#ff88aa" stroke-width="1.5"/>
    <text x="80" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#ffaacc">Store Queue</text>
    <line x1="10" y1="35" x2="150" y2="35" stroke="#ff88aa" opacity="0.3"/>
    <text x="15" y="58" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffccdd">• 8 项深度</text>
    <text x="15" y="78" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffccdd">• 顺序提交</text>
    <text x="15" y="98" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffccdd">• 数据转发</text>
    <text x="15" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffccdd">• 合并写</text>
  </g>
  
  <g transform="translate(600, 115)">
    <rect x="0" y="0" width="160" height="140" rx="10" fill="rgba(0,80,100,0.3)" stroke="#00aaff" stroke-width="1.5"/>
    <text x="80" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ccff">存储转发</text>
    <line x1="10" y1="35" x2="150" y2="35" stroke="#00aaff" opacity="0.3"/>
    <text x="15" y="58" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">• 地址匹配</text>
    <text x="15" y="78" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">• 数据转发</text>
    <text x="15" y="98" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">• 减少延迟</text>
    <text x="15" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">• 部分匹配</text>
  </g>
  
  <g transform="translate(40, 270)">
    <rect x="0" y="0" width="720" height="140" rx="8" fill="rgba(0,40,60,0.25)" stroke="#00dddd" stroke-width="1"/>
    <text x="360" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#00eeee">访存流程</text>
    
    <text x="20" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#dddd44">Load 流程:</text>
    <text x="20" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#eeeebb">1. 检查 Store Queue 是否有地址匹配</text>
    <text x="20" y="88" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#eeeebb">2. 匹配则转发数据，否则访问 D-Cache</text>
    <text x="20" y="106" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#eeeebb">3. 缓存命中返回数据，缺失则等待填充</text>
    <text x="20" y="124" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#eeeebb">4. 结果通过 CDB 广播</text>
    
    <text x="400" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ffaacc">Store 流程:</text>
    <text x="400" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ffccdd">1. 地址和数据进入 Store Queue</text>
    <text x="400" y="88" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ffccdd">2. 等待 ROB 提交信号</text>
    <text x="400" y="106" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ffccdd">3. 提交后写入 D-Cache</text>
    <text x="400" y="124" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ffccdd">4. 释放 Store Queue 项</text>
  </g>
  
  <text x="400" y="435" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="10" fill="#668888" opacity="0.7">MEM Stage · 访存阶段</text>
</svg>