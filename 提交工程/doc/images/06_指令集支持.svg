<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a25"/>
      <stop offset="50%" style="stop-color:#0d1d3a"/>
      <stop offset="100%" style="stop-color:#051515"/>
    </linearGradient>
    <linearGradient id="auroraE" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff77;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00ffbb;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="auroraF" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00ccff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow6"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="boxG6"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  
  <rect width="1200" height="850" fill="url(#bg6)"/>
  
  <!-- 星空 -->
  <g opacity="0.8">
    <circle cx="60" cy="40" r="1.5" fill="#fff"/><circle cx="180" cy="70" r="1" fill="#adf"/>
    <circle cx="320" cy="35" r="2" fill="#fff"/><circle cx="480" cy="80" r="1" fill="#8cf"/>
    <circle cx="620" cy="25" r="1.5" fill="#fff"/><circle cx="780" cy="60" r="1" fill="#adf"/>
    <circle cx="920" cy="45" r="2" fill="#fff"/><circle cx="1080" cy="75" r="1" fill="#8cf"/>
    <circle cx="100" cy="130" r="1" fill="#fff"/><circle cx="350" cy="110" r="1.5" fill="#adf"/>
    <circle cx="650" cy="120" r="1" fill="#fff"/><circle cx="950" cy="100" r="1.5" fill="#8cf"/>
    <circle cx="50" cy="810" r="1" fill="#fff"/><circle cx="250" cy="830" r="1.5" fill="#adf"/>
    <circle cx="550" cy="800" r="1" fill="#fff"/><circle cx="850" cy="820" r="2" fill="#8cf"/>
    <circle cx="1100" cy="790" r="1" fill="#fff"/>
  </g>
  
  <!-- 极光 -->
  <ellipse cx="600" cy="100" rx="500" ry="60" fill="url(#auroraE)" opacity="0.4"/>
  <ellipse cx="400" cy="140" rx="350" ry="45" fill="url(#auroraF)" opacity="0.3"/>
  
  <!-- 标题 -->
  <text x="600" y="70" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="46" fill="#00ffcc" filter="url(#glow6)">RISC-V 指令集支持</text>
  <text x="600" y="110" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="20" fill="#88ddff">RV32IM + Zicsr 扩展 · 完整指令实现</text>

  <!-- RV32I 基础指令集 -->
  <g transform="translate(50, 150)">
    <g filter="url(#boxG6)">
      <rect x="0" y="0" width="540" height="320" rx="12" fill="rgba(0,100,80,0.35)" stroke="#00ffaa" stroke-width="2"/>
      <text x="270" y="32" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="24" fill="#00ffcc">RV32I 基础整数指令集</text>
      <line x1="15" y1="48" x2="525" y2="48" stroke="#00ffaa" opacity="0.4"/>
      
      <!-- 算术运算 -->
      <g transform="translate(20, 65)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">算术运算</text>
        <rect x="0" y="10" width="240" height="55" rx="5" fill="rgba(0,255,170,0.1)" stroke="#00ffaa" stroke-width="0.5"/>
        <text x="10" y="30" font-family="monospace" font-size="11" fill="#aaffcc">ADD SUB ADDI</text>
        <text x="10" y="50" font-family="monospace" font-size="11" fill="#aaffcc">SLT SLTU SLTI SLTIU</text>
      </g>
      
      <!-- 逻辑运算 -->
      <g transform="translate(280, 65)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">逻辑运算</text>
        <rect x="0" y="10" width="240" height="55" rx="5" fill="rgba(0,255,170,0.1)" stroke="#00ffaa" stroke-width="0.5"/>
        <text x="10" y="30" font-family="monospace" font-size="11" fill="#aaffcc">AND OR XOR</text>
        <text x="10" y="50" font-family="monospace" font-size="11" fill="#aaffcc">ANDI ORI XORI</text>
      </g>
      
      <!-- 移位运算 -->
      <g transform="translate(20, 140)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">移位运算</text>
        <rect x="0" y="10" width="240" height="55" rx="5" fill="rgba(0,255,170,0.1)" stroke="#00ffaa" stroke-width="0.5"/>
        <text x="10" y="30" font-family="monospace" font-size="11" fill="#aaffcc">SLL SRL SRA</text>
        <text x="10" y="50" font-family="monospace" font-size="11" fill="#aaffcc">SLLI SRLI SRAI</text>
      </g>
      
      <!-- 分支跳转 -->
      <g transform="translate(280, 140)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">分支跳转</text>
        <rect x="0" y="10" width="240" height="55" rx="5" fill="rgba(0,255,170,0.1)" stroke="#00ffaa" stroke-width="0.5"/>
        <text x="10" y="30" font-family="monospace" font-size="11" fill="#aaffcc">BEQ BNE BLT BGE BLTU BGEU</text>
        <text x="10" y="50" font-family="monospace" font-size="11" fill="#aaffcc">JAL JALR</text>
      </g>
      
      <!-- 访存指令 -->
      <g transform="translate(20, 215)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">访存指令</text>
        <rect x="0" y="10" width="240" height="55" rx="5" fill="rgba(0,255,170,0.1)" stroke="#00ffaa" stroke-width="0.5"/>
        <text x="10" y="30" font-family="monospace" font-size="11" fill="#aaffcc">LB LH LW LBU LHU</text>
        <text x="10" y="50" font-family="monospace" font-size="11" fill="#aaffcc">SB SH SW</text>
      </g>
      
      <!-- 其他指令 -->
      <g transform="translate(280, 215)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">其他指令</text>
        <rect x="0" y="10" width="240" height="55" rx="5" fill="rgba(0,255,170,0.1)" stroke="#00ffaa" stroke-width="0.5"/>
        <text x="10" y="30" font-family="monospace" font-size="11" fill="#aaffcc">LUI AUIPC</text>
        <text x="10" y="50" font-family="monospace" font-size="11" fill="#aaffcc">FENCE ECALL EBREAK</text>
      </g>
      
      <text x="270" y="305" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#88ddcc">共 40 条基础指令 · 完整 RV32I 实现</text>
    </g>
  </g>
  
  <!-- RV32M 乘除扩展 -->
  <g transform="translate(620, 150)">
    <g filter="url(#boxG6)">
      <rect x="0" y="0" width="280" height="320" rx="12" fill="rgba(80,60,0,0.35)" stroke="#ffcc00" stroke-width="2"/>
      <text x="140" y="32" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="24" fill="#ffdd44">RV32M 乘除扩展</text>
      <line x1="15" y1="48" x2="265" y2="48" stroke="#ffcc00" opacity="0.4"/>
      
      <!-- 乘法指令 -->
      <g transform="translate(20, 65)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#ffdd44">乘法指令</text>
        <rect x="0" y="10" width="240" height="80" rx="5" fill="rgba(255,204,0,0.1)" stroke="#ffcc00" stroke-width="0.5"/>
        <text x="10" y="30" font-family="monospace" font-size="12" fill="#ffeebb">MUL    - 低32位结果</text>
        <text x="10" y="50" font-family="monospace" font-size="12" fill="#ffeebb">MULH   - 高32位(有符号)</text>
        <text x="10" y="70" font-family="monospace" font-size="12" fill="#ffeebb">MULHSU - 高32位(混合)</text>
        <text x="10" y="90" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ddcc88">延迟: 3 周期流水线</text>
      </g>
      
      <!-- 除法指令 -->
      <g transform="translate(20, 165)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#ffdd44">除法指令</text>
        <rect x="0" y="10" width="240" height="100" rx="5" fill="rgba(255,204,0,0.1)" stroke="#ffcc00" stroke-width="0.5"/>
        <text x="10" y="30" font-family="monospace" font-size="12" fill="#ffeebb">DIV    - 有符号除法</text>
        <text x="10" y="50" font-family="monospace" font-size="12" fill="#ffeebb">DIVU   - 无符号除法</text>
        <text x="10" y="70" font-family="monospace" font-size="12" fill="#ffeebb">REM    - 有符号取余</text>
        <text x="10" y="90" font-family="monospace" font-size="12" fill="#ffeebb">REMU   - 无符号取余</text>
        <text x="10" y="110" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ddcc88">延迟: 34 周期迭代</text>
      </g>
      
      <text x="140" y="305" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ddcc88">共 8 条乘除指令</text>
    </g>
  </g>
  
  <!-- Zicsr 扩展 -->
  <g transform="translate(930, 150)">
    <g filter="url(#boxG6)">
      <rect x="0" y="0" width="220" height="320" rx="12" fill="rgba(80,0,80,0.35)" stroke="#ff88ff" stroke-width="2"/>
      <text x="110" y="32" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="24" fill="#ffaaff">Zicsr 扩展</text>
      <line x1="15" y1="48" x2="205" y2="48" stroke="#ff88ff" opacity="0.4"/>
      
      <g transform="translate(20, 65)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#ffaaff">CSR 访问指令</text>
        <rect x="0" y="10" width="180" height="130" rx="5" fill="rgba(255,136,255,0.1)" stroke="#ff88ff" stroke-width="0.5"/>
        <text x="10" y="30" font-family="monospace" font-size="12" fill="#ffccff">CSRRW  - 读写</text>
        <text x="10" y="50" font-family="monospace" font-size="12" fill="#ffccff">CSRRS  - 读并置位</text>
        <text x="10" y="70" font-family="monospace" font-size="12" fill="#ffccff">CSRRC  - 读并清零</text>
        <text x="10" y="90" font-family="monospace" font-size="12" fill="#ffccff">CSRRWI - 立即数写</text>
        <text x="10" y="110" font-family="monospace" font-size="12" fill="#ffccff">CSRRSI - 立即数置位</text>
        <text x="10" y="130" font-family="monospace" font-size="12" fill="#ffccff">CSRRCI - 立即数清零</text>
      </g>
      
      <g transform="translate(20, 210)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ffaaff">支持的 CSR:</text>
        <text x="10" y="22" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ddaadd">mstatus, mie, mtvec</text>
        <text x="10" y="40" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ddaadd">mepc, mcause, mtval</text>
        <text x="10" y="58" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ddaadd">mcycle, minstret</text>
      </g>
      
      <text x="110" y="305" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="13" fill="#ddaadd">共 6 条 CSR 指令</text>
    </g>
  </g>
  
  <!-- 指令格式说明 -->
  <g transform="translate(50, 500)">
    <g filter="url(#boxG6)">
      <rect x="0" y="0" width="1100" height="280" rx="12" fill="rgba(0,40,60,0.3)" stroke="#00aaff" stroke-width="1"/>
      <text x="550" y="35" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="22" fill="#00ddff" filter="url(#glow6)">RISC-V 指令格式</text>
      
      <!-- R-Type -->
      <g transform="translate(30, 60)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">R-Type (寄存器-寄存器)</text>
        <rect x="0" y="10" width="500" height="30" rx="3" fill="rgba(0,255,170,0.15)" stroke="#00ffaa"/>
        <text x="30" y="30" font-family="monospace" font-size="10" fill="#aaffcc">funct7[31:25] | rs2[24:20] | rs1[19:15] | funct3[14:12] | rd[11:7] | opcode[6:0]</text>
        <text x="520" y="30" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#88ddcc">ADD, SUB, AND, OR...</text>
      </g>
      
      <!-- I-Type -->
      <g transform="translate(30, 110)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#ffcc00">I-Type (立即数)</text>
        <rect x="0" y="10" width="500" height="30" rx="3" fill="rgba(255,204,0,0.15)" stroke="#ffcc00"/>
        <text x="30" y="30" font-family="monospace" font-size="10" fill="#ffeebb">imm[31:20]                | rs1[19:15] | funct3[14:12] | rd[11:7] | opcode[6:0]</text>
        <text x="520" y="30" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ddcc88">ADDI, LW, JALR...</text>
      </g>
      
      <!-- S-Type -->
      <g transform="translate(30, 160)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#ff88aa">S-Type (存储)</text>
        <rect x="0" y="10" width="500" height="30" rx="3" fill="rgba(255,136,170,0.15)" stroke="#ff88aa"/>
        <text x="30" y="30" font-family="monospace" font-size="10" fill="#ffccdd">imm[11:5]     | rs2[24:20] | rs1[19:15] | funct3[14:12] | imm[4:0] | opcode[6:0]</text>
        <text x="520" y="30" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ddaacc">SB, SH, SW</text>
      </g>
      
      <!-- B-Type -->
      <g transform="translate(30, 210)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#aa88ff">B-Type (分支)</text>
        <rect x="0" y="10" width="500" height="30" rx="3" fill="rgba(170,136,255,0.15)" stroke="#aa88ff"/>
        <text x="30" y="30" font-family="monospace" font-size="10" fill="#ccaaff">imm[12|10:5]  | rs2[24:20] | rs1[19:15] | funct3[14:12] | imm[4:1|11] | opcode</text>
        <text x="520" y="30" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aa88dd">BEQ, BNE, BLT...</text>
      </g>
      
      <!-- U/J-Type -->
      <g transform="translate(600, 60)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00aaff">U-Type (高位立即数)</text>
        <rect x="0" y="10" width="450" height="30" rx="3" fill="rgba(0,170,255,0.15)" stroke="#00aaff"/>
        <text x="30" y="30" font-family="monospace" font-size="10" fill="#aaddff">imm[31:12]                                        | rd[11:7] | opcode[6:0]</text>
        <text x="350" y="30" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#88aadd">LUI, AUIPC</text>
      </g>
      
      <g transform="translate(600, 110)">
        <text x="0" y="0" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00dddd">J-Type (跳转)</text>
        <rect x="0" y="10" width="450" height="30" rx="3" fill="rgba(0,221,221,0.15)" stroke="#00dddd"/>
        <text x="30" y="30" font-family="monospace" font-size="10" fill="#aaffff">imm[20|10:1|11|19:12]                             | rd[11:7] | opcode[6:0]</text>
        <text x="350" y="30" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#88dddd">JAL</text>
      </g>
      
      <!-- 指令统计 -->
      <g transform="translate(600, 170)">
        <rect x="0" y="0" width="450" height="90" rx="8" fill="rgba(0,100,80,0.2)" stroke="#00ffaa"/>
        <text x="225" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="18" fill="#00ffcc">指令集统计</text>
        <text x="30" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#aaffcc">• RV32I: 40 条</text>
        <text x="180" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ffeebb">• RV32M: 8 条</text>
        <text x="320" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#ffccff">• Zicsr: 6 条</text>
        <text x="225" y="78" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#ffffff">总计: 54 条指令</text>
      </g>
    </g>
  </g>
  
  <text x="600" y="830" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#668888" opacity="0.7">RISC-V RV32IM 乱序执行处理器 · 指令集支持</text>
</svg>