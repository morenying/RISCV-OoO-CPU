<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#1a1a0f"/>
      <stop offset="50%" style="stop-color:#0d0d08"/>
      <stop offset="100%" style="stop-color:#050503"/>
    </radialGradient>
    
    <linearGradient id="aurora4a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
    
    <linearGradient id="aurora4b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    
    <linearGradient id="glass4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
    
    <filter id="glow4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="3" result="blur2"/>
      <feMerge><feMergeNode in="blur1"/><feMergeNode in="blur2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <filter id="warningGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <filter id="auroraBlur4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  
  <rect width="900" height="550" fill="url(#bg4)"/>
  
  <!-- 星云 -->
  <ellipse cx="200" cy="150" rx="250" ry="90" fill="#ffd700" opacity="0.025" filter="url(#auroraBlur4)"/>
  <ellipse cx="700" cy="400" rx="220" ry="80" fill="#00d4ff" opacity="0.02" filter="url(#auroraBlur4)"/>
  
  <!-- 极光 -->
  <path d="M-50,40 Q200,10 450,50 T950,30" stroke="#ffd700" stroke-width="50" fill="none" opacity="0.1" filter="url(#auroraBlur4)">
    <animate attributeName="d" values="M-50,40 Q200,10 450,50 T950,30;M-50,25 Q200,55 450,20 T950,45;M-50,40 Q200,10 450,50 T950,30" dur="10s" repeatCount="indefinite"/>
  </path>
  <path d="M-50,80 Q250,45 550,90 T950,65" stroke="#00d4ff" stroke-width="35" fill="none" opacity="0.07" filter="url(#auroraBlur4)">
    <animate attributeName="d" values="M-50,80 Q250,45 550,90 T950,65;M-50,65 Q250,90 550,55 T950,80;M-50,80 Q250,45 550,90 T950,65" dur="12s" repeatCount="indefinite"/>
  </path>
  
  <!-- 星星 -->
  <circle cx="60" cy="50" r="1.8" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="160" cy="90" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="290" cy="60" r="2" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="440" cy="45" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="590" cy="80" r="1.8" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="730" cy="55" r="1.3" fill="white" opacity="0.6"/>
  <circle cx="850" cy="95" r="2" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="100" cy="500" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="320" cy="520" r="1.8" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="560" cy="510" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="770" cy="530" r="1.6" fill="white" opacity="0.7"/>
  
  <!-- 主卡片 -->
  <rect x="100" y="150" width="700" height="300" rx="25" fill="url(#glass4)" stroke="url(#aurora4b)" stroke-width="1.5"/>
  
  <!-- 警告状态指示灯 -->
  <circle cx="170" cy="220" r="35" fill="#ffd700" filter="url(#warningGlow)" opacity="0.95">
    <animate attributeName="r" values="35;38;35" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="170" y="232" text-anchor="middle" fill="#050503" font-size="28" font-weight="bold">⚠</text>
  
  <!-- 标题 -->
  <text x="480" y="215" text-anchor="middle" fill="url(#aurora4b)" font-size="42" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#glow4)">译码器单元测试</text>
  <text x="480" y="255" text-anchor="middle" fill="#00d4ff" font-size="16" font-family="KaiTi, STKaiti, 楷体, serif" opacity="0.8">RV32IM + Zicsr · 51条指令覆盖</text>
  
  <!-- 统计数据 -->
  <text x="180" y="310" fill="rgba(255,255,255,0.5)" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">测试总数</text>
  <text x="180" y="345" fill="#00d4ff" font-size="32" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">76</text>
  
  <text x="330" y="310" fill="rgba(255,255,255,0.5)" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">通过数</text>
  <text x="330" y="345" fill="#00ffc8" font-size="32" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">74</text>
  
  <text x="480" y="310" fill="rgba(255,255,255,0.5)" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">失败数</text>
  <text x="480" y="345" fill="#ffd700" font-size="32" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#warningGlow)">2</text>
  
  <text x="630" y="310" fill="rgba(255,255,255,0.5)" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">通过率</text>
  <text x="630" y="345" fill="#ffd700" font-size="32" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#warningGlow)">97.4%</text>
  
  <!-- 失败项说明 -->
  <rect x="130" y="365" width="280" height="55" rx="10" fill="rgba(255,215,0,0.08)" stroke="#ffd700" stroke-width="1"/>
  <text x="145" y="388" fill="#ffd700" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">❌ LUI寄存器字段提取</text>
  <text x="145" y="408" fill="rgba(255,255,255,0.4)" font-size="10" font-family="KaiTi, STKaiti, 楷体, serif">rs1/rs2期望为0，实际提取了指令位</text>
  
  <rect x="430" y="365" width="280" height="55" rx="10" fill="rgba(255,215,0,0.08)" stroke="#ffd700" stroke-width="1"/>
  <text x="445" y="388" fill="#ffd700" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">❌ JALR非法funct3检测</text>
  <text x="445" y="408" fill="rgba(255,255,255,0.4)" font-size="10" font-family="KaiTi, STKaiti, 楷体, serif">funct3≠0应标记为非法指令</text>
  
  <!-- 底部说明 -->
  <text x="450" y="490" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">
    影响较低 · 不影响正常指令执行 · 建议修复边界情况
  </text>
</svg>