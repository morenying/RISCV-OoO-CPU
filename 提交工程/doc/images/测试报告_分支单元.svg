<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="30%" r="75%">
      <stop offset="0%" style="stop-color:#0f1a2e"/>
      <stop offset="50%" style="stop-color:#080d18"/>
      <stop offset="100%" style="stop-color:#020308"/>
    </radialGradient>
    
    <linearGradient id="aurora5a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffc8"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#bf00ff"/>
    </linearGradient>
    
    <linearGradient id="aurora5b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffc8"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00ffc8"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    
    <linearGradient id="glass5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
    
    <!-- 分支路径渐变 -->
    <linearGradient id="branchPath" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffc8"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#bf00ff"/>
    </linearGradient>
    
    <filter id="glow5" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="3" result="blur2"/>
      <feMerge><feMergeNode in="blur1"/><feMergeNode in="blur2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <filter id="auroraBlur5" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  
  <rect width="900" height="550" fill="url(#bg5)"/>
  
  <!-- 星云 -->
  <ellipse cx="220" cy="160" rx="280" ry="100" fill="#00ffc8" opacity="0.03" filter="url(#auroraBlur5)"/>
  <ellipse cx="680" cy="390" rx="240" ry="85" fill="#bf00ff" opacity="0.025" filter="url(#auroraBlur5)"/>
  
  <!-- 极光 -->
  <path d="M-50,40 Q200,10 450,50 T950,30" stroke="#00ffc8" stroke-width="55" fill="none" opacity="0.11" filter="url(#auroraBlur5)">
    <animate attributeName="d" values="M-50,40 Q200,10 450,50 T950,30;M-50,25 Q200,55 450,20 T950,45;M-50,40 Q200,10 450,50 T950,30" dur="10s" repeatCount="indefinite"/>
  </path>
  <path d="M-50,80 Q250,45 550,90 T950,65" stroke="#00d4ff" stroke-width="38" fill="none" opacity="0.08" filter="url(#auroraBlur5)">
    <animate attributeName="d" values="M-50,80 Q250,45 550,90 T950,65;M-50,65 Q250,90 550,55 T950,80;M-50,80 Q250,45 550,90 T950,65" dur="12s" repeatCount="indefinite"/>
  </path>
  <path d="M-50,115 Q300,80 650,120 T950,100" stroke="#bf00ff" stroke-width="22" fill="none" opacity="0.05" filter="url(#auroraBlur5)">
    <animate attributeName="d" values="M-50,115 Q300,80 650,120 T950,100;M-50,100 Q300,120 650,85 T950,115;M-50,115 Q300,80 650,120 T950,100" dur="14s" repeatCount="indefinite"/>
  </path>
  
  <!-- 分支路径装饰 -->
  <g transform="translate(40, 240)" opacity="0.4">
    <path d="M0,30 L40,30 L60,10 M40,30 L60,50" stroke="url(#branchPath)" stroke-width="3" fill="none" filter="url(#glow5)">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
    <circle cx="40" cy="30" r="5" fill="#00ffc8" filter="url(#glow5)"/>
  </g>
  
  <!-- 星星 -->
  <circle cx="65" cy="50" r="1.8" fill="white" opacity="0.85"><animate attributeName="opacity" values="0.85;0.3;0.85" dur="2.9s" repeatCount="indefinite"/></circle>
  <circle cx="170" cy="90" r="1.3" fill="white" opacity="0.6"/>
  <circle cx="300" cy="60" r="2" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.35;0.9" dur="3.3s" repeatCount="indefinite"/></circle>
  <circle cx="460" cy="48" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="600" cy="82" r="1.8" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.7s" repeatCount="indefinite"/></circle>
  <circle cx="740" cy="58" r="1.4" fill="white" opacity="0.65"/>
  <circle cx="850" cy="98" r="2" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="110" cy="505" r="1.6" fill="white" opacity="0.7"/>
  <circle cx="330" cy="520" r="1.8" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.35;0.8" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="580" cy="512" r="1.3" fill="white" opacity="0.6"/>
  <circle cx="780" cy="530" r="1.7" fill="white" opacity="0.75"/>
  
  <!-- 流星 -->
  <line x1="810" y1="65" x2="750" y2="125" stroke="url(#aurora5a)" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0.85;0" dur="4.2s" repeatCount="indefinite"/>
  </line>
  
  <!-- 主卡片 -->
  <rect x="100" y="160" width="700" height="280" rx="25" fill="url(#glass5)" stroke="url(#aurora5b)" stroke-width="1.5"/>
  
  <!-- 状态指示灯 -->
  <circle cx="170" cy="230" r="35" fill="#00ffc8" filter="url(#glow5)" opacity="0.95">
    <animate attributeName="r" values="35;38;35" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <text x="170" y="242" text-anchor="middle" fill="#020308" font-size="32" font-weight="bold">✓</text>
  
  <!-- 标题 -->
  <text x="480" y="225" text-anchor="middle" fill="url(#aurora5b)" font-size="42" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#glow5)">分支单元测试</text>
  <text x="480" y="265" text-anchor="middle" fill="#00d4ff" font-size="16" font-family="KaiTi, STKaiti, 楷体, serif" opacity="0.8">Property 4 · 条件分支与无条件跳转验证</text>
  
  <!-- 统计数据 -->
  <text x="220" y="330" fill="rgba(255,255,255,0.5)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif">测试总数</text>
  <text x="220" y="370" fill="#00ffc8" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif">361</text>
  
  <text x="450" y="330" fill="rgba(255,255,255,0.5)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="middle">通过率</text>
  <text x="450" y="370" fill="#00ffc8" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="middle">100%</text>
  
  <text x="680" y="330" fill="rgba(255,255,255,0.5)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="end">误预测检测</text>
  <text x="680" y="370" fill="#00d4ff" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="end">✓</text>
  
  <!-- 分支类型标签 -->
  <g transform="translate(115, 400)">
    <rect x="0" y="0" width="70" height="32" rx="8" fill="rgba(0,255,200,0.1)" stroke="#00ffc8" stroke-width="1"/>
    <text x="35" y="22" text-anchor="middle" fill="#00ffc8" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">相等</text>
  </g>
  <g transform="translate(195, 400)">
    <rect x="0" y="0" width="70" height="32" rx="8" fill="rgba(0,255,200,0.1)" stroke="#00ffc8" stroke-width="1"/>
    <text x="35" y="22" text-anchor="middle" fill="#00ffc8" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">不等</text>
  </g>
  <g transform="translate(275, 400)">
    <rect x="0" y="0" width="70" height="32" rx="8" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
    <text x="35" y="22" text-anchor="middle" fill="#00d4ff" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">小于</text>
  </g>
  <g transform="translate(355, 400)">
    <rect x="0" y="0" width="70" height="32" rx="8" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
    <text x="35" y="22" text-anchor="middle" fill="#00d4ff" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">大等</text>
  </g>
  <g transform="translate(435, 400)">
    <rect x="0" y="0" width="85" height="32" rx="8" fill="rgba(191,0,255,0.1)" stroke="#bf00ff" stroke-width="1"/>
    <text x="42" y="22" text-anchor="middle" fill="#bf00ff" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">无符号小于</text>
  </g>
  <g transform="translate(530, 400)">
    <rect x="0" y="0" width="85" height="32" rx="8" fill="rgba(191,0,255,0.1)" stroke="#bf00ff" stroke-width="1"/>
    <text x="42" y="22" text-anchor="middle" fill="#bf00ff" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">无符号大等</text>
  </g>
  <g transform="translate(625, 400)">
    <rect x="0" y="0" width="70" height="32" rx="8" fill="rgba(0,255,200,0.1)" stroke="#00ffc8" stroke-width="1"/>
    <text x="35" y="22" text-anchor="middle" fill="#00ffc8" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">跳转</text>
  </g>
  
  <!-- 底部说明 -->
  <text x="450" y="490" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">
    八种分支指令完整覆盖 · 误预测检测验证
  </text>
</svg>