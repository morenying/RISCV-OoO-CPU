<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#0f1a2e"/>
      <stop offset="50%" style="stop-color:#080d15"/>
      <stop offset="100%" style="stop-color:#020305"/>
    </radialGradient>
    
    <linearGradient id="aurora1a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffc8"/>
      <stop offset="100%" style="stop-color:#00a86b"/>
    </linearGradient>
    
    <linearGradient id="aurora1b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffc8"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00ffc8"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    
    <linearGradient id="glass1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
    
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="3" result="blur2"/>
      <feMerge><feMergeNode in="blur1"/><feMergeNode in="blur2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <filter id="soft1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    
    <filter id="auroraBlur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  
  <rect width="900" height="550" fill="url(#bg1)"/>
  
  <!-- 星云 -->
  <ellipse cx="200" cy="150" rx="300" ry="100" fill="#00ffc8" opacity="0.03" filter="url(#auroraBlur1)"/>
  <ellipse cx="700" cy="400" rx="250" ry="80" fill="#00d4ff" opacity="0.025" filter="url(#auroraBlur1)"/>
  
  <!-- 极光 -->
  <path d="M-50,40 Q200,10 450,50 T950,30" stroke="#00ffc8" stroke-width="60" fill="none" opacity="0.12" filter="url(#auroraBlur1)">
    <animate attributeName="d" values="M-50,40 Q200,10 450,50 T950,30;M-50,25 Q200,55 450,20 T950,45;M-50,40 Q200,10 450,50 T950,30" dur="10s" repeatCount="indefinite"/>
  </path>
  <path d="M-50,80 Q250,45 550,90 T950,65" stroke="#00d4ff" stroke-width="40" fill="none" opacity="0.08" filter="url(#auroraBlur1)">
    <animate attributeName="d" values="M-50,80 Q250,45 550,90 T950,65;M-50,65 Q250,90 550,55 T950,80;M-50,80 Q250,45 550,90 T950,65" dur="12s" repeatCount="indefinite"/>
  </path>
  
  <!-- 星星 -->
  <circle cx="60" cy="50" r="1.8" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="150" cy="90" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="280" cy="60" r="2" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="420" cy="45" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="580" cy="80" r="1.8" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="720" cy="55" r="1.3" fill="white" opacity="0.6"/>
  <circle cx="840" cy="95" r="2" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="100" cy="500" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="300" cy="520" r="1.8" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="550" cy="510" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="750" cy="530" r="1.6" fill="white" opacity="0.7"/>
  
  <!-- 流星 -->
  <line x1="800" y1="60" x2="740" y2="120" stroke="url(#aurora1a)" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="4s" repeatCount="indefinite"/>
  </line>
  
  <!-- 主卡片 -->
  <rect x="100" y="160" width="700" height="280" rx="25" fill="url(#glass1)" stroke="url(#aurora1b)" stroke-width="1.5"/>
  
  <!-- 状态指示灯 -->
  <circle cx="170" cy="230" r="35" fill="#00ffc8" filter="url(#glow1)" opacity="0.95">
    <animate attributeName="r" values="35;38;35" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="170" y="242" text-anchor="middle" fill="#020305" font-size="32" font-weight="bold">✓</text>
  
  <!-- 标题 -->
  <text x="480" y="225" text-anchor="middle" fill="url(#aurora1b)" font-size="42" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#glow1)">算术逻辑单元测试</text>
  <text x="480" y="265" text-anchor="middle" fill="#00d4ff" font-size="16" font-family="KaiTi, STKaiti, 楷体, serif" opacity="0.8">Property 13 · 功能单元正确性验证</text>
  
  <!-- 统计数据 -->
  <text x="220" y="330" fill="rgba(255,255,255,0.5)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif">测试总数</text>
  <text x="220" y="370" fill="#00ffc8" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#soft1)">12,007</text>
  
  <text x="450" y="330" fill="rgba(255,255,255,0.5)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="middle">通过率</text>
  <text x="450" y="370" fill="#00ffc8" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="middle" filter="url(#soft1)">100%</text>
  
  <text x="680" y="330" fill="rgba(255,255,255,0.5)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="end">失败数</text>
  <text x="680" y="370" fill="#00ffc8" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="end" filter="url(#soft1)">0</text>
  
  <!-- 操作类型标签 -->
  <g transform="translate(120, 400)">
    <rect x="0" y="0" width="75" height="32" rx="8" fill="rgba(0,255,200,0.1)" stroke="#00ffc8" stroke-width="1"/>
    <text x="37" y="22" text-anchor="middle" fill="#00ffc8" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">加法</text>
  </g>
  <g transform="translate(205, 400)">
    <rect x="0" y="0" width="75" height="32" rx="8" fill="rgba(0,255,200,0.1)" stroke="#00ffc8" stroke-width="1"/>
    <text x="37" y="22" text-anchor="middle" fill="#00ffc8" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">减法</text>
  </g>
  <g transform="translate(290, 400)">
    <rect x="0" y="0" width="75" height="32" rx="8" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
    <text x="37" y="22" text-anchor="middle" fill="#00d4ff" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">左移</text>
  </g>
  <g transform="translate(375, 400)">
    <rect x="0" y="0" width="75" height="32" rx="8" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
    <text x="37" y="22" text-anchor="middle" fill="#00d4ff" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">右移</text>
  </g>
  <g transform="translate(460, 400)">
    <rect x="0" y="0" width="75" height="32" rx="8" fill="rgba(191,0,255,0.1)" stroke="#bf00ff" stroke-width="1"/>
    <text x="37" y="22" text-anchor="middle" fill="#bf00ff" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">与运算</text>
  </g>
  <g transform="translate(545, 400)">
    <rect x="0" y="0" width="75" height="32" rx="8" fill="rgba(191,0,255,0.1)" stroke="#bf00ff" stroke-width="1"/>
    <text x="37" y="22" text-anchor="middle" fill="#bf00ff" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">或运算</text>
  </g>
  <g transform="translate(630, 400)">
    <rect x="0" y="0" width="75" height="32" rx="8" fill="rgba(0,255,200,0.1)" stroke="#00ffc8" stroke-width="1"/>
    <text x="37" y="22" text-anchor="middle" fill="#00ffc8" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">异或</text>
  </g>
  
  <!-- 底部说明 -->
  <text x="450" y="490" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">
    基于属性的随机测试 · LFSR随机数生成 · 边界条件覆盖
  </text>
</svg>