<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <radialGradient id="bg7" cx="50%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#0f1a2e"/>
      <stop offset="50%" style="stop-color:#080d15"/>
      <stop offset="100%" style="stop-color:#020305"/>
    </radialGradient>
    
    <linearGradient id="aurora7a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffc8"/>
      <stop offset="100%" style="stop-color:#00a86b"/>
    </linearGradient>
    
    <linearGradient id="aurora7b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffc8"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00ffc8"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    
    <linearGradient id="glass7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
    
    <filter id="glow7" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="3" result="blur2"/>
      <feMerge><feMergeNode in="blur1"/><feMergeNode in="blur2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <filter id="soft7" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    
    <filter id="auroraBlur7" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  
  <rect width="900" height="550" fill="url(#bg7)"/>
  
  <!-- 星云 -->
  <ellipse cx="150" cy="120" rx="280" ry="90" fill="#00d4ff" opacity="0.035" filter="url(#auroraBlur7)"/>
  <ellipse cx="750" cy="450" rx="220" ry="70" fill="#00ffc8" opacity="0.03" filter="url(#auroraBlur7)"/>
  <ellipse cx="450" cy="280" rx="350" ry="120" fill="#bf00ff" opacity="0.015" filter="url(#auroraBlur7)"/>
  
  <!-- 极光 -->
  <path d="M-50,35 Q180,5 400,45 T950,25" stroke="#00ffc8" stroke-width="55" fill="none" opacity="0.1" filter="url(#auroraBlur7)">
    <animate attributeName="d" values="M-50,35 Q180,5 400,45 T950,25;M-50,20 Q180,50 400,15 T950,40;M-50,35 Q180,5 400,45 T950,25" dur="9s" repeatCount="indefinite"/>
  </path>
  <path d="M-50,75 Q220,40 500,85 T950,60" stroke="#00d4ff" stroke-width="35" fill="none" opacity="0.07" filter="url(#auroraBlur7)">
    <animate attributeName="d" values="M-50,75 Q220,40 500,85 T950,60;M-50,60 Q220,85 500,50 T950,75;M-50,75 Q220,40 500,85 T950,60" dur="11s" repeatCount="indefinite"/>
  </path>
  
  <!-- 星星 -->
  <circle cx="70" cy="55" r="1.9" fill="white" opacity="0.85"><animate attributeName="opacity" values="0.85;0.35;0.85" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="160" cy="95" r="1.3" fill="white" opacity="0.65"/>
  <circle cx="290" cy="50" r="2.1" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="430" cy="40" r="1.4" fill="white" opacity="0.7"/>
  <circle cx="590" cy="75" r="1.7" fill="white" opacity="0.75"><animate attributeName="opacity" values="0.75;0.3;0.75" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="730" cy="60" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="850" cy="90" r="1.9" fill="white" opacity="0.85"><animate attributeName="opacity" values="0.85;0.35;0.85" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="110" cy="490" r="1.4" fill="white" opacity="0.65"/>
  <circle cx="320" cy="515" r="1.7" fill="white" opacity="0.75"><animate attributeName="opacity" values="0.75;0.3;0.75" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="560" cy="505" r="1.1" fill="white" opacity="0.55"/>
  <circle cx="760" cy="525" r="1.5" fill="white" opacity="0.7"/>
  
  <!-- 流星 -->
  <line x1="180" y1="40" x2="120" y2="100" stroke="url(#aurora7a)" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0.85;0" dur="5s" repeatCount="indefinite" begin="1s"/>
  </line>
  <line x1="750" y1="80" x2="690" y2="140" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="4s" repeatCount="indefinite" begin="3s"/>
  </line>
  
  <!-- 主卡片 -->
  <rect x="100" y="160" width="700" height="280" rx="25" fill="url(#glass7)" stroke="url(#aurora7b)" stroke-width="1.5"/>
  
  <!-- 状态指示灯 -->
  <circle cx="170" cy="230" r="35" fill="#00ffc8" filter="url(#glow7)" opacity="0.95">
    <animate attributeName="r" values="35;38;35" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="170" y="242" text-anchor="middle" fill="#020305" font-size="32" font-weight="bold">✓</text>
  
  <!-- 标题 -->
  <text x="480" y="225" text-anchor="middle" fill="url(#aurora7b)" font-size="42" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#glow7)">分支预测单元测试</text>
  <text x="480" y="265" text-anchor="middle" fill="#00d4ff" font-size="16" font-family="KaiTi, STKaiti, 楷体, serif" opacity="0.8">Property 9 · 分支预测恢复验证</text>
  
  <!-- 统计数据 -->
  <text x="220" y="330" fill="rgba(255,255,255,0.5)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif">测试总数</text>
  <text x="220" y="370" fill="#00ffc8" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" filter="url(#soft7)">6</text>
  
  <text x="450" y="330" fill="rgba(255,255,255,0.5)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="middle">通过率</text>
  <text x="450" y="370" fill="#00ffc8" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="middle" filter="url(#soft7)">100%</text>
  
  <text x="680" y="330" fill="rgba(255,255,255,0.5)" font-size="14" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="end">失败数</text>
  <text x="680" y="370" fill="#00ffc8" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, 楷体, serif" text-anchor="end" filter="url(#soft7)">0</text>
  
  <!-- 测试项标签 -->
  <g transform="translate(130, 400)">
    <rect x="0" y="0" width="130" height="32" rx="8" fill="rgba(0,255,200,0.1)" stroke="#00ffc8" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" fill="#00ffc8" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">GHR检查点恢复</text>
  </g>
  <g transform="translate(275, 400)">
    <rect x="0" y="0" width="110" height="32" rx="8" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
    <text x="55" y="22" text-anchor="middle" fill="#00d4ff" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">预测训练</text>
  </g>
  <g transform="translate(400, 400)">
    <rect x="0" y="0" width="110" height="32" rx="8" fill="rgba(191,0,255,0.1)" stroke="#bf00ff" stroke-width="1"/>
    <text x="55" y="22" text-anchor="middle" fill="#bf00ff" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">BTB目标</text>
  </g>
  <g transform="translate(525, 400)">
    <rect x="0" y="0" width="110" height="32" rx="8" fill="rgba(0,255,200,0.1)" stroke="#00ffc8" stroke-width="1"/>
    <text x="55" y="22" text-anchor="middle" fill="#00ffc8" font-size="13" font-family="KaiTi, STKaiti, 楷体, serif">GHR更新</text>
  </g>
  
  <!-- 底部说明 -->
  <text x="450" y="490" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="12" font-family="KaiTi, STKaiti, 楷体, serif">
    TAGE预测器 · 全局历史寄存器 · 分支目标缓冲区
  </text>
</svg>