<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/><stop offset="50%" style="stop-color:#0d2040"/><stop offset="100%" style="stop-color:#051a1a"/>
    </linearGradient>
    <linearGradient id="au12" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffaa;stop-opacity:0"/><stop offset="50%" style="stop-color:#00ffcc;stop-opacity:0.5"/><stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </linearGradient>
    <filter id="g12"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg12)"/>
  <g opacity="0.7">
    <circle cx="40" cy="30" r="1.5" fill="#fff"/><circle cx="150" cy="50" r="1" fill="#adf"/><circle cx="300" cy="25" r="2" fill="#fff"/>
    <circle cx="500" cy="45" r="1" fill="#8cf"/><circle cx="650" cy="35" r="1.5" fill="#fff"/><circle cx="760" cy="55" r="1" fill="#adf"/>
    <circle cx="80" cy="420" r="1" fill="#fff"/><circle cx="400" cy="430" r="1.5" fill="#adf"/><circle cx="720" cy="425" r="1" fill="#8cf"/>
  </g>
  <ellipse cx="400" cy="60" rx="300" ry="40" fill="url(#au12)" opacity="0.4"/>
  
  <text x="400" y="55" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="32" fill="#00ffcc" filter="url(#g12)">ROB 重排序缓冲</text>
  <text x="400" y="85" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#00ffaa">Reorder Buffer · 顺序提交 · 精确异常</text>
  
  <g transform="translate(40, 115)">
    <rect x="0" y="0" width="200" height="160" rx="10" fill="rgba(0,100,80,0.3)" stroke="#00ffaa" stroke-width="1.5"/>
    <text x="100" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ffcc">基本参数</text>
    <line x1="10" y1="35" x2="190" y2="35" stroke="#00ffaa" opacity="0.3"/>
    <text x="15" y="58" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffcc">• 32 项循环队列</text>
    <text x="15" y="78" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffcc">• 头指针 (提交)</text>
    <text x="15" y="98" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffcc">• 尾指针 (分配)</text>
    <text x="15" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffcc">• 顺序提交保证</text>
    <text x="15" y="138" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffcc">• 精确异常支持</text>
  </g>
  
  <g transform="translate(260, 115)">
    <rect x="0" y="0" width="280" height="160" rx="10" fill="rgba(0,60,100,0.3)" stroke="#00aaff" stroke-width="1.5"/>
    <text x="140" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#00ccff">ROB 项结构</text>
    <line x1="10" y1="35" x2="270" y2="35" stroke="#00aaff" opacity="0.3"/>
    
    <g transform="translate(15, 50)">
      <rect x="0" y="0" width="250" height="25" rx="4" fill="rgba(0,170,255,0.15)" stroke="#00aaff"/>
      <text x="5" y="17" font-family="monospace" font-size="9" fill="#aaddff">PC | rd | prd | old_prd | value | done | exc</text>
    </g>
    
    <text x="15" y="100" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">• PC: 指令地址</text>
    <text x="15" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">• rd/prd: 目标寄存器</text>
    <text x="140" y="100" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">• old_prd: 旧映射</text>
    <text x="140" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">• done: 完成位</text>
    <text x="15" y="136" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">• value: 结果值</text>
    <text x="140" y="136" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaddff">• exc: 异常信息</text>
  </g>
  
  <g transform="translate(560, 115)">
    <rect x="0" y="0" width="200" height="160" rx="10" fill="rgba(80,60,0,0.3)" stroke="#ccaa00" stroke-width="1.5"/>
    <text x="100" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="16" fill="#ddbb44">核心功能</text>
    <line x1="10" y1="35" x2="190" y2="35" stroke="#ccaa00" opacity="0.3"/>
    <text x="15" y="58" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#eeddbb">• 保持程序顺序</text>
    <text x="15" y="78" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#eeddbb">• 存储推测结果</text>
    <text x="15" y="98" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#eeddbb">• 异常检测点</text>
    <text x="15" y="118" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#eeddbb">• 分支恢复点</text>
    <text x="15" y="138" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#eeddbb">• 寄存器释放控制</text>
  </g>
  
  <g transform="translate(40, 290)">
    <rect x="0" y="0" width="720" height="120" rx="8" fill="rgba(0,40,60,0.25)" stroke="#00ffaa" stroke-width="1"/>
    <text x="360" y="25" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="14" fill="#00ffcc">ROB 操作</text>
    
    <text x="20" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaffcc">分配 (RN阶段):</text>
    <text x="20" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#88ddcc">尾指针分配新项，记录指令信息</text>
    
    <text x="200" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#aaddff">完成 (EX阶段):</text>
    <text x="200" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#88aadd">CDB广播时更新完成位和结果</text>
    
    <text x="400" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#eeddbb">提交 (WB阶段):</text>
    <text x="400" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ddcc88">头部完成则提交，更新架构状态</text>
    
    <text x="600" y="50" font-family="KaiTi, STKaiti, 楷体, serif" font-size="12" fill="#ffaaaa">回滚:</text>
    <text x="600" y="70" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#ff8888">异常/误预测时恢复状态</text>
    
    <text x="20" y="100" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#aaffcc">提交条件: 头部指令完成 + 无异常 + Store已准备好写入</text>
  </g>
  
  <text x="400" y="435" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="10" fill="#668888" opacity="0.7">ROB · 重排序缓冲</text>
</svg>